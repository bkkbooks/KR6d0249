body:
  text: 嘉禾楞嚴講寺靈耀全彰著與徑山化城寂照兩常住修刻大藏書楞嚴寺法未靈耀謹致書於雙徑化城寂照兩院諸禪師座下愚聞君子務本今方冊大藏實為楞嚴與上山兩院共有根本所當急先務者故敢以書告古人刻藏雖為普利簿海內外而板藏化城寂照流通楞嚴講寺坊內羨餘刻藏之外可以莊嚴三寶養育英賢無事匍匐檀門畔援法事山上板頭修板之餘可以供頓數口安心進道不必一鉢千家夤緣世諦其為三院堅固根本意甚深也無如法久獘生經坊惟知羨餘而不知整理法寶上山惟知板頭而不知修刻藏板歲月既深蟲蠧朽蝕將來大藏羽化可待矣只據不慧玉菴丙辰請藏三人共閱部帙失次錯簡失張莫可枚舉有張無數十百字或五六字一二字者今春澹歸和尚請藏其首面經論輙多殘缺而黃龍禪師檢出缺字尤多推其所由板非鐵石歲久朽蠧理之固然頃松陵眾護法書致不慧深憂藏板不修則佛法壅塞柏密二大師慈悲心血殆將付之東流一派故以修刻經板重整大藏之役責成不慧不慧捧讀而慚惶無地葢吾三院根本祖師功德皆茫乎不知忽若罔聞而居家之士獨能惓惓法門慇懃致意其智愚賢不肖為何如哉良可愧矣秪緣大清國之內之外惟此一藏其來敦請者不辭千萬途程歲月勞頓及請至所在開卷展閱則糢糊失錯一字之缺理即難明況多多乎哉倘欲來寺對補則道遼路遠山川阻深若欲從人徵考又不能起迦文之白骨而問之則知板上一字殘缺不修即如來之血脉一點不通於天下四海矣過當何如哉甚有以論代經指鹿為馬惟圖滿套成帙便可博換金錢不知壅法誑僧罪當發配泥人雖或匠工有所草草虎兕出匣龜玉毀櫝是誰之過歟夫住持唯曰火食之多少而已耳經坊唯曰羨餘之有無而已耳上山唯曰板頭之輕重而已耳殊不知火食羨餘板頭自何來哉豈非皆出於藏板之根本乎今廢藏板不之修治而顧較量於錙銖之利母乃棄其大者遠者而計其小者近者哉抑亦清晝攫金惟利是視而不思務本耶雖曰烈士徇名常人狥利以若所為即利亦恐不可久得也何者葢今不修則朽蠧十二再五年不修則板壞十五再十年不修則一大藏之板皆坐化尸解矣夫有本斯可求利本之則無顧安所得利哉諸師於此可大悟矣然而三院之主人必皆曰吾唯計今日之利入厚薄耳藏板之朽蠧於他年於我何與故皆坐視不理吾恐檇李丹陽金谿吳江諸護法同起而料理蝌蚪時事則比比嘔唾不暇未必能安坐吞嚼大藏也借使大護法不見僧過異日閻老案前鐵丸銅汁伊誰代之吞噉乎吾輩出家兒其可不信因果哉吳江周安石老護法云板頭不修藏板秪圖肥家潤身故護法神明屢降警誡不為護祐此皆諸公目擊親甞之事可不畏諸竊迹數年間不能修板亦有其故自甲寅用兵以來關山阻隔請藏無人故致坊內經本殆空而上山板頭絕望即守院數口尚費支吾何能分枵腹之餘以補蠧蝕之殘哉苐不慧疇昔檢藏林下凡遇失紙脫字以致義理難通處未甞不頓足張目惋詈典守者素飱不治今自既尸位住持其可更受天下人之痛罵及我耶是以修刻大藏是不慧之夙志而端本之急先務也況蒙眾護法之督率乎哉問知寂照全朽藏板六百餘葉稍稍蠧蝕亦數十萬字并煑板等項所費不及千金工程不出三載較之當日眾護法倡興之時不過一部刻資耳不慧已允眾檀之命董成其事但諸公皆密大師苗裔云仍幸俱戮力同心贊襄厥美或為料理修刻或為涉乞緣是所仰望而敦請者也至於些少板頭且充工費之外更有不繼不慧當典衣鬻鉢稱貨補填不敢波及諸公也意在重新全藏法寶流通使柏密二祖慈悲心血不付逝水諸檀護施刻功勳不為木屑是所願耳次則堅固化城寂照楞嚴之共有根本亦不可緩也夫愚公移山大施抒海人固笑其愚而不知量矣然精誠所至或亦天龍為之陰相而克底於成不可知也燥人辭煩幸無罪焉復吳江眾護法請修藏板啟附來啟恭惟大護法諸老先生門下才高鄴下藻掞天庭立功立德既照曜於兩間乃教乃禪式彌綸於一貫惟典型之詒在神州千秋萬歲即貧道之仰止高風匪朝伊夕比緣楞嚴初住躬失摳趨忽業珠玉遙頒寵逾華袞濫嬰獎借恥實甚焉致累失言罪莫逭矣因軫大藏板朽蠧欲隳爰命不肖耀修刻重新多方弘護深知受囑靈山莊語殷勤喜見同心紫柏顧耀藏拙山邨曾亦如蟲食字拜瞻藏典甞悲宿蠧侵文鈞命賷來似符夙志奉公行去所在不辭苐念人微事偉且難俶始況慮月深歲久豈易善成是以心懷踴躍步或盤桓仰恃大君子分光賜照同舒手眼乃俾不肖耀拾遺補闕稍整琅𪻱庶寶王大藏得重新於四海而檀護鴻功可昭視於無疆矣臨楮不勝感惶之至稔惟和尚解行雙超智悲竝運經律論藏既兼總以無遺性相禪宗且交融于不二諸方之向風已久末法之仰賴尤殷不慧輩跧處松陵未遑躬趨籌室遙瞻慈範徒切依歸茲啟方冊藏經乃紫柏尊者發大誓願創此勝緣初剞劂于五臺後耑歸于雙徑而寂照化城均為刊刻貯板之所前人設立良規隨刻隨修以防朽蠧修補之費取足板頭不意日久法湮後人弁髦成憲競思染指任情廢壞經雖裝印損蝕漸多日失月虧將何底止而新舊板頭不知作何銷繳宜乎貴郡諸紳有徹底清查之約此誠摧魔剔弊之大快舉也深幸道駕駐錫楞嚴此地藏冊所由流通梨棗失修得以申責伏望和尚大放光明出廣長舌俾獅蟲勿來食肉法寶永獲端嚴匪特不慧輩傾心起舞尊者常寂光中亦當開顏含笑矣善友王晉卿于刻藏事宜向受諸檀囑付在山多年最稱諳練幸進而詳詢之頗可資商確也倉卒布牋諸法侶不及署名統希慈鑒周彬吳之紀等拜修刻大藏經板疏紫柏大師與同志諸檀護易梵本為方冊合經疏成一藏以便流通使坐而討論者可家致而人閱三登九上者可負之而遄趨即縉紳先生家亦可竝藏書而列於二酉恣漁臘以深究本來功莫大焉其如木刻無金石之堅歲久有朽蠧之患失此不修將來羽化深可悲惜葢北藏銷為阿堵南藏殘缺無徵則此楞嚴方冊不獨為大清國內基禎國寶實且為簿海內外之法身慧命聞忉利天王一日三時望南閻浮提禮拜以其有書般若也則人天之慧命佛祖之菩提皆賴乎是矣倘此處之藏板一字不修即如來之法身慧命一點不流通於天上人間矣況日損月隳竟歸烏有者哉不慧偶廁住持願崇修整然稽佛法東流自漢明帝永平至唐玄宗開元所譯經律論洎諸賢著疏已五千四十八卷共成一藏實錄自開元庚午至德宗文皇帝末年相繼譯著又四千九百餘卷合開元崇福舊錄彚成萬卷之靈文嗣後殘唐五代宋元所譯暨朱明章疏語錄倍簁於前若以當時創刻之費較之今日修補之資不翅馬體毫末太倉一粟耳夫資費小而大藏全用力少而收功偉予不敢自私而敢告諸同志矣且聞昔與紫柏大師同心創刻大藏者有金谿賀丹陽于松陵周嘉禾陸馮朱包諸先生現宰官身行菩薩願而告厥成功則今日不慧創修大藏又當佇望於諸先生後身之檀相助為理矣復淨慧監院公啟伏以覺場小始效供原依列聖叢林大闢當門特重普心三年知事一喝明宗千室尋緣四真入妙恭惟大德望某老師座下根屬好堅楠梓豫章而巽美行稀瑕玷圭璋明月以方精了禪翁之弘度水雲歸德生薑漢之操守龍象欽風推厚居薄故人苟煖之即若煖之在己人約己則眾或飽之亦如飽之措躬雖云願力使然要亦天真不勉兼之謙和御物口揚緇白之間真實由衷道望溢方州之外初地二地庶幾無慚三果四果綽然有比蹈身子成規忽振胡僧光錫乃依自報內院別嚴無畏之牀式委樂獨初機傳語優曇之典寧希功侔佛祖實欲澤及人天斯葢連䮽神照而邁乎久長竝轡了明而亡其椎魯者也顧某藥欄小草覺苑焦芽息觀微微未踐四依之閾弘敷戞戞難窺五地之墻是宜養拙丘墟長行粥飯何期客秋把臂便許同心獻歲浮杯竟蒙推轂昔盧行者陸沉下板滿擬終古無聞得印禪師勸請開堂為千秋盛舉某忽膺斯遇感切分光恐負隆情懼侔戴岳是以仰循再讓三讓之規復勞一命二命之至尚恃大禪德均調緩急使寶乘而直騁康莊乃俾不肖某咸開真俗秉獨妙以遍泯森羅庶一門無棟撓之虞而眾卉沐同雲之潤祇俟嚶鳴求友仰應同聲之慰諭新華雨座平分多寶之親依臨楮無任瞻依之至復淨慧諸護法公啟恭惟大檀越諸老先生門下湖山毓秀寶海因達尊競爽隨應度以現身富貴渾忘降崇榮而濟物職由米汁成漕樹神雨食遂使香流毛孔器滿珍羮豈徒率先二氏以雄長實且高佩一乘而載導顧某莊嚴弘護業素漸於海院靈芝忉利敷迎忽更委以蓮宗淨慧金聲輕擲玉帛遙頒葢欲揭鷲峰獨妙遍記含哺兼之暢佛隴惟圓等開瞢識噫歟盛舉匹闍世以無雙大矣弘猷邁隋王而莫及顧某小根小莖苐可卑棲林麓矧茲大大剎恐難安坐雲堂以故啣命殷憂類臨深而履薄撫躬多懼尚鼠首與羝籓仰恃大檀後先弘護遏宼虐以謹無良加之息我黥而補我劓乃俾不慧內外妝寧遵祖誥以示周行庶幾俶其始而令其終則推錢指廩會實相以非癡即聞法傳經詣寶山而不退謹依玄鳥來思高門而窺長者紅桃穠矣踐丈室以睹天人臨楮不勝感惶之復復永壽院檀護啟伏以北斗摛光當宁獲夔龍之佐西天敷化干城憑王謝之賢明良喜起歌徹卿雲擁護流通願承金囑斯國步恃以靈長即法運由之隆固恭惟大護法諸老先生門下朝端麟鳳啟沃基禎霄表晨星具瞻寅亮高眠擁錦八華磚而讓寵燃黎視草五色筆以增神方其大聲諤諤寧在豸冠且也眾止行行實歸驄馬莫非皐夔申甫之賢均荷喉舌股肱之重者也惟是文人慧業不諼金河顧命全體大用還遵鷲嶺分符故能立功立德立言成三不朽之盛業乃教乃禪乃律明一大事以春秋駕楊李而尤麗文章躋蘇王而更深明悟此慨法門訛替種智淪胥乃於永壽院幻敷四華座席委將不肖某勉弘一雨琅函珠璣在握開緘而霞舉雲飛筐篚登筵拜錫也蔀豐河潤顧某學慳半豹智不全囊讐三軌而尚遜說行覽大車以未臻乘御是以撫躬知恧拜命增慚恐循覆餗之譏終詒甄賢之誚所恃大君子寶符玄覽曲為二天之庇乃俾不肖某鉛刀借便得展一割之能庶古剎於以更新即台命因之仰副謹擬春日載陽晤玄度朱門之對摳衣遷徙領淨名丈室之彈臨楮無任主臣之復天溪和尚傳和尚諱受登字景淳別號初依嘉禾秀水幽湖郁氏子父心溪母沈氏生於萬曆丁未六月五日康熈乙卯六月九日寂於開法之大覺方丈世壽六十九僧臘四十二臨終遺囑不許求塔銘行狀崇事虗文有乖真實以治命也弟子遵之靈耀係披薙稟戒受學得法之弟子私淑既多受法聿深竊記毫末存以想像非銘狀比也師薙落硤石廣惠寺厭鄙所習決志參方受沙彌戒於天童密雲和尚圓比丘戒于曲水古德和尚得法於龍樹桐溪和尚傳持天台教觀年三十四始住仁和天溪之大覺庵即專心教觀戮力講懺寒暑不輟歲以為常學子歸投如川赴壑天溪法席為海內無憂安隱幢矣三十七始應當湖馬園楞嚴之講其間應講則廣安玉庵大善智證化城三峰梵洲幽瀾暫住則玉庵等覺率偶應耳非專屬也其行道養道拓涅槃俱在大覺具吳默之先生記著有藥師行法准提行法大悲懺科瑜伽詮次并註會刻法華文句等書夫住院弘經興福著述與人同耳不足言也先師正惡鋪張世事臚列年譜種種時套故不許銘狀耳惟是勤信真正撐持法門一片苦心特邁等夷有足多者敢記萬一師志學之年即攷苦讀誦中夜不輟略以木息身不臥廣牀厚蓐深自策勵無少懈息住院以後研幾教觀必堂內外人俱𥨊息已方自就臥鐘未鳴而足已在地矣此數十年如一日者即疾漸惟幾猶不釋卷勤何如哉生平不畜少有香資即入常住每曰吾凡多與得常住一分一文輙復快活惟眾鐻修天台大師塔資一項為常住借去二十金恐昧果因中心不懌臨終檢自裝文句三十餘部付耀比四人令出銀修葺其信重因果如此行履真率似出天性即傍人勉其暫作一句方便虗辭初或允之至期不能也凡待同學同行子侄常人靡不皆然至臨終遺囑勿乞虗文以汙真實玄義止觀等書皆有手眼判釋文章典雅膾炙人口示寂前數日俱付諸祖龍曰身將死焉用文之且語言文字亦非吾之本真也嗚呼時丁末法人競虗名若師之真實不虗當求諸飲光盤特間也住大覺三十七年終不畜沙彌小兒足不履尼塵俗舍有來叩者聲色過厲略無假借或譏以為不近人情師曰美男破老美女破實寧失之此不失之彼也雖縉紳先生執弟子禮侍坐聆教以為固然略無愉色既去即安心教觀亦無干謁扳援之事并不形諸口矣語言行事巨細不苟有即之者惟覺其光明正大之氣凜凜逼人而不可犯凡海內衲子至省城者未有不參大覺師慎重法門不輕授受學既半而別嗣者居多即今四方禪教出世弘化之賢半曾北面天溪老人者因慨佛法下衰故於天台教觀極力研詳鉤深剔遠凡臨講授意在言先旨提象外發先聖之未發啟後學之未聞甞教耀輩曰法門衰替比比成風惟當精心教觀啟迪後昆則台嶺一柱庶可遏狂汝其勗諸復以楞嚴數解與耀曰此經未涉大師手判諸家互解未免有狐裘蒙戎之憾汝其悉心成疏則可謂山家功臣矣至於應講住院隨世隨緣不必論也故師出世三十餘年唯以弘宣教部維持法門為己任應赴講期殊不多也今六月九日示寂先十日二三弟兄皆集未能忘情不無戚戚而師欣欣然絕無苦難之色徹晝夜講示顯密教部隱深宗旨勉勵後人撐持祖道以未完詮次註託運遐法兄以高僧傳委諸不肖觀其娓娓台旨似乎未盡所蘊有再來弘之意運遐法兄曰和尚今而後安心念佛罷師笑曰西方吾豈不信顧人各有願也索筆書偈而逝則和尚撐持法門之弘願固永永無窮也豈常人所能比擬哉餘生字說冬乃歲之餘月乃日之餘生乃死之餘餘則雖非正事然無其餘亦不能成一切正事也夢忍月子嘔血至脂膜盡出不能食者七日淹淹就木身在死法中矣來予菴就醫鄰初石子石子投以奇藥而有生之氣養一月而竟無死之心矣今將歸予為更其字曰餘生且贈之以說曰子歸盍善用其餘以為福抑不善用其餘以售禍邪今而後精心乘戒戮力上流光揚祖道優入聖倫是善用其餘以成正事如月為日之餘而能清涼光耀遍照神洲也予方拭目竢之矣若貪饕飲噉肆志無慚乘戒俱緩重入泥黎是不善用其餘以釀惡業如田水月所謂楚南泰屯得餘是同而用餘迴別則餘者又不如無餘者之為愈也則是字也雖曰因事制名以示不忘然汝名為月而字為餘意取月為日餘以光燭無疆不取屯氏之餘也庸人視為兩可智者唯從一說斯意在此而不在彼矣昔黃魯直甞以奇藥活人惜其所活者皆庸人耳勿使石子復抱魯直之惜可也題報恩院交單松直棘曲寶喜嵩嗔不變隨緣之後人物各自有性也予性喜銀而性不喜畜所到之處必竭厥心力興建三寶雖至逋負百金催索狺狺而不之悔亦性成也去夏檀護請住此院院經兵馬住後殘缺可知遂事土木至今悲懺期畢會計所費二百餘金功過自知不必言也頃應嘉禾楞嚴之請院託祉森住持人謂當書所有以便後人守成故即於修建冊後略記新置以為交單今而後興乎廢乎人各有性也豈可以我性為人性哉己未季春八日智覺寺重興禪堂緣起智覺教寺在嘉禾郡治之南十五里宋開寶八年剏建咸平六年勅賜太平天壽院治平元年勅賜今額兵燹之餘蕩為劫灰茂艸矣永樂元年里人張福信重建相傳始於漢永年十三年又云柳孝文妻弟張綱捨建皆齊東之訛也但塔寺所在必有禪堂居眾用表剎幢面目此寺獨無竊有疑焉葢大殿既成則列前後左右無非禪室也嗣後列院分房隨隅割據則苐有香火之實而失禪室之名理之固然無足疑者向延等菴法兄養靜觀音堂者十有三年丙辰秋等兄化去大宗伯杜公暨本方信士杜君沈子目諸君請予重建禪堂為千秋美舉於菊月望鳩工庀材至仲冬朔堂殿告成期周兩月匠及千工四方瞻仰咸訝為神運速成密邇知交但憐予空炊無米斯實大士之靈夫豈一人之力哉惟是數十日間陞座談經之暇即躬親土木手足胼胝慘淡經營夜以繼日竭厥心力而不敢告勞斗膽勇為而不顧後乏者是予將此深心奉塵剎之微願也落成之後雖逋負數十餘金然而規模既就至止者略為可觀今而後白足來叅旃檀殿明窗淨几檀賢稅駕大士堂仰止留連應二時之鐘板則香積厨與僧堂竝列接十方之賢聖則雲水寮對客座分階是役也檀波輻輳固仰千門之無靳而劻勷終始則最初請主杜沈諸君居多茲不忍沒其盛心也謹紀顛末為刊緣起云題智覺交單智覺無交單而有交單實等菴法兄剏始也智覺無禪堂而有禪堂實予為之剏建也崇禎癸酉諸檀護重建大殿之後以所餘舊料搆觀音堂三間於殿東以為一方祈籤之所留一香火僧或佛子看守而已康熈二載始延等菴法師於中養道今丙辰七月等師即世以新舊器物彚成一冊以便來者稽程是有交單之昉也眾信隨延不慧住止鳩工予因眾志樂善即謀啟建禪堂始九月望終季冬朔厥工告成計建殿堂房寮二十餘間雲水於以歸投學人於焉戾止而始不失禪堂之名實矣屈指又三稔矣予既膺省城報恩之住而復有武原玉菴分心故將殿堂一并託諸文可闍黎併以建置屋物續書冊後使夫來者知無交單而有交單始於等菴法師無禪堂而有禪堂建於不慧也修井文古聖賢分田而制之以井者不獨為灌潤田禾也夫木入水而水上出源源不竭可以備湯飲解熱惱禦嚴寒充澣滌福利溥哉東里之井其來有歲矣無如為日既久磚石用隳舊井無禽時共舍之井泥不食人失其利象曰改邑不改井宜甃之道也既人井井而家井井固當人甃井而家甃井不煩董事者之𤨏告矣雖然人烏得以知之行將潔乃底去乃汙增乃磚固乃石寒食清明都過了石泉槐火一時新美冽涓涓可用汲而備湯飲充澣滌竝受其福在諸賢一舉手間則又不得不家至戶告也蓮花賦昔人目蓮花為君子空王比玅法以蓮花豈非以其皭然不滓高潔出塵者乎予於西湖之蓮三覯而三變其態有感於斯輙比物比志而賦其事焉辛卯中夏西泠文會艤舟湖心寺轉宣公祠自孤山金沙灘而止焉美哉蓮花之盛也其開三兮未敷七耳蓮房深鎻香閨未啟掩映綽約中藏處子尚孩未笄憨然稚齒調笑由人含羞不語密雨絲絲似左家嬌女貪花而不辭數百之適微風漾漾若漢皐神僊出游而恒珮如卵之子細藥初萌似壽陽深臥宮簷肥葩欲綻若玉奴賜浴壽邸又如若耶溪畔隱花樣之西施姑射山中藏如雪之神女半面初呈春閨少婦乍窺楊柳之青倚葉方遮前街女兒昨贈搔頭之玉雨露不沾尉遲女未解承恩風波獨立淳于兒能徼溫旨或窺宋於東墻或拜月於西廂或回舟於洛浦或尚衣於君王亭亭高櫂宛昆明樓上選明月夜珠之句依依欲舞若太液池邊逞雲衣花貌之章或群或友乍頡乍頏三三五五嬝嬝揚揚皆碧玉之未經破爪而臨鏡則妒婦心降者也間有花已開香氣全紅顏的的翠葢田田玉肌皜皜腰柳纖纖有如脩眉高目列屋而閑居丹唇皓齒爭妍而取憐遊絲薄霧趂天風而遠引䫫飛燕之弟兄掌舞濃粧淡抹與西湖而競爽如虢姬之姉妹朝天韓侯顧止從碩人者固非一人凝脂柔柹美碩人者又非一端遂使眾羨傾城而我見猶憐香滯回舟一水人爭立馬千山是葢定情之伊始故能消魂於萬千越一紀而予信宿于鳳林精舍則大非其舊矣時維七月霜露欲零香銷南國怨入西陵霜倒半池潛傷皓質露冷蓮房盡墮香魂馬成群而踐踏兵肆力以瓜分偶扶笻而一探傷時序之不平何夙昔之榮華忽摧殘而不勝有如千金貴姝百寶娉婷國破家亡流落風塵亂頭麤服疾首捧心殘香剩粉零落無馨如怨如怒如泣如訴或仰天而欲絕若把劒之虞兮或低頭而不語類息國之夫人又如露筯廟內立節之姑孃隋楊宮裏繫詩之佳人情人紫玉或通半體閶門舞鶴竟滅全身輕紗血淚喬玄玄生殉處士青草黃昏蘇小小死臥孤墳或如何氏稚經綠珠墮粉烏𮉚在篋小玉長徂義髻拋河馬嵬受窘葢伊闕之蓮已謝唐宮六郎不醒人間釵襖已化哀煙天上髻鬟或作朝雲是皆情甘怨死誓不俗生之蓮花人也至於色香雖在攀折欲空焚芰製而裂荷衣劈蓮房而髠蘂宮或歸酒肉城居或逐旃帳𦎬𦵇酒家樓上供昏醉之村夫販子筐中逐愛錢之賈翁甚至解髻而去席或破顏而毀容翠羽常低多值斂眉之態瓠犀難見罕逢啟齒之儂正如良荊百萬一朝僕妾玉葉金枝紛紛狼藉王后骨醉戚姬人艮瓶抱入井之悲金城哭出塞之曲麗華受傷于擒虎伏后杖斃于孟德衛共薑之死靡他仲卿妻殺身立節江心負父載沉載浮驛亭斷臂不淄不涅是又貞節之顯於中華羞逐雄豪之熱客者也若夫蓮子隨他去不及季倫情重紅粉馬駝歸羞見元戎報捷琵琶邑邑空調馬上之絃惜死妮妮徒敘胡茄之拍悲哉芙蓉木末陂澤秋風周郎不顧妝鏡臺空紈扇既捐紅葉難通陳后長門梅女西宮傷離情于南浦掩淚眼于牆東疎疎雨散神女之魂不返瀼瀼露滴湘妃之泣靡窮嗚呼音落黃埃車馬不識或採蓮花或採蓮子而風流頓盡矣予曰昔年遇子南湖之南靚粧婉變蓮步姍姍今我來思搖落三潭物猶如此人何以堪予因之低回而不忍去焉葢因困乏轉須親也或唔之于曉風殘月或慰之于暮雨朝烟而花則似嚬似笑若送若迎宛若生平者正同是天涯流落人相逢何必曾相識也其間一縷餘香脉脉侵人斌媚妖嬈猶作青樓故態如徐孃老去風情在西子嚬來態轉嬌予正色語之曰吾學道人此心已作沾泥絮不逐東風上下狂也卿用卿法於吾法中便為風馬牛矣嗣後已之母擾我心但子有美質而生非其時植非其處故受困頓殘折之辱而未之知耶夫西湖者乃榮辱世界酒肉道場也莊生觀化而化及生子處榮辱而辱及子理之必然者也子亦何不早達始知冶容妄方悟群心邪則何須待零落然後始知空哉今而後盍各韜光絕迹長揖人寰鉛華洗去隱入溪山庶幾榮辱不關抱知希而自全其天也今戊午又十八年矣六月之望予以一艇而訪舊日之蓮則杳然絕迹也惟見一片湖光千山黛色月皎皎以娛人風悠悠而動物不覺蒿目欲空而煩襟頓滌身世若亡而塵心自滅坡老曰浩浩乎如憑虗御風而莫知其所止飄飄乎若遺世獨立羽化而登僊於茲更切須臾轉不定之金波頃刻臥深沉之鏡璧上下渺茫而惟現一輪之心月依稀有響疑蘇小小不忘哀草青陵而環珮空歸月夜魂彷彿聞聲似王子安猶吟落霞孤騖齊飛秋水長天一色而湖心寺無蓮也宣公祠無蓮也孤山金沙灘舉無蓮也夫謝月鏡之別王清去去不乏風流杜蘭香之辭張碩來來更無消息其斯之謂乎王子猶訪戴之舟興盡而返何必蓮哉舟回淨寺忽覺一道香塵順風而前予曰異哉莫是散胡麻飯女郎引人尋覓抑俱娑陀天下降塵凡乎果見藕花居畔玉面紅顏三三兩兩軃引香肩綠衣黃裏麗服花鈿貌舒菡蓞體露嬋娟渺不知夫新知故識共要予于蓮沚桑間殆三生石上舊精魂乎更不須咏此身雖異性常存也觀其瀟灑出塵高潔幽閑翛然自得不受人憐如鹿母夫人未出草廬艾封人子尚隱驪關魚玄機既入女冠孫琰妻長嘯峽山張麗華之飄飄欲舉秦弄玉之冉冉乘鸞又如天台洞口迎郎之女伴羅浮山內宴客之神僊微香時吐似服驚精返魂羽衣旋舞曾遊月府廣寒則此一晤也竟入避秦女隊何論晉魏而不知有漢也又若天風吹下不欲許飛瓊之名字落在人間者矣予笑曰子無乃疇昔之夜鳳林寺畔委頓而受吾教者乎子真可教也今試與子提衡而論方予未冠時與子邂逅於西泠之涘果能即其時避紛華而出塵自勵則久為天上之人即予亦可望而不可親矣何致遘明夷而迍邅無如甘苦未甞而厥志未堅則是子之惰也倘鳳林寺側輕予教而仍溺五濁今日又不知作何狀態安得如此超脫而僊僊斯又是子之達也假令天下熱中塵客皆如子受教而拂衣高蹈則又何必予之喃喃說法而升壇哉易曰肥遯又曰嘉遯美夫囊括君子也況桃源之隱逸天目之智僊乎然子既僊胎予亦無意於人間世矣姑勉汝更進步於百尺之竿吾聞從是過西十萬億土有七寶池其中無老無幼無榮無辱無女無男有決志往生者皆證大覺之金僊而子之氏族多產其間則又勝於子輩皷雲璈飲玉液唱步虗淪七趣之守屍神僊汝其齋心而先我著鞭尚不辜三遇而三有益焉彼姝者子皆倩微風而點首心莫逆而亡言眾芳斂衽予亦欲眠二三子欲挾以俱予曰不可香味頹高志色聲喪軀齡遠之易為士近之難為情獨不顧荷神誚爾不戒乎二三子曰然則夫子何獨留連眷眷哉母亦好色耶予曰不然吾之好色不與俗同直好其德耳葢予因三遇西湖之蓮而三變其態有似一變至魯一變至道皭然不滓高潔出塵之達人君子故樂與之周旋夫關睢樂而不淫葢思窈窕以配君子哀賢才而不淫其色也阮嗣宗日狎鄰女而不私死又往哭之是真好色而不淫者歟故寓言其事而託以美人也詩曰云誰之思西方美人庶幾旦暮遇之乎又是予之志也為玉菴住持愚原闍黎封龕拈封條示之云愚原闍黎箇是從上佛祖自行化他安身立命處也汝先於此而安住之耶汝夙有願力聞道㝡早住院以來事事真正秉志固窮不屑世諦流布竭厥心力撑持祖道法門操守峻峭岌然難於干犯直心矢口似乎不近人情弗顧或人之所讒忌惟知行吾之所當行乘戒精密綽有祖風博聞弘辯不忝吾門謂非乘願而來不可也至於自行化他之事稍畢遽爾熱處抽身預期絕食而逝衣院託付有人苟能如此足矣何必百歲千椿而世或憎夫壽命不長吾却喜汝真常早悟葢有生有滅有去有來有長有短者世人之見也無長無短無去無來無滅無生者本真獨露也既悟真常則生亦可死亦可去亦可來亦可長亦可短亦可北洲是癡活原壤為偷生長壽天八難之一水老鶴無聞之僧斯則雖壽而夭雖存而滅雖生而死也日面世尊朝生暮滅樓至如來聞道即行是則雖短而長雖去而存雖死而生矣知此則可無遺憾于生死短長間矣今姑舉習聞公案使汝安身起用大通智聖佛十劫坐道場佛法不現前而彌勒世尊于出家日即證三德涅槃非根有利鈍道有難易也顧左右云且道畢竟為著甚麼緣宜賒促應示長短耳封題市居漫咏集巢父掉頭不肯住居人共住武陵源此避市朝之隱逸耳若東方曼倩避世於金馬門司馬季主列肆于長安市則初不外市朝而亦不失其為高致也何哉葢情致兩忌者雖市朝亦巖穴奚必望望然去之而後為高哉引巖子氣宇翛散固不干進于朝然亦未甞求離於市浮沉里閈列肆以逐什二之息抑何下也及示余所著市居漫咏集感時翫物比事屬辭文簡遠而意清冲有元亮之餘風間露世相無生不即不離之旨殆閙市靜搥入鄽觀化者之流亞也張文昌云先生已得道市井亦安居君殆是之矣於是乎下睨身江湖而心魏闕形山林而識闤闠者賢不肖何如哉夫大隱于市吾于引巖子見之矣巢父漁人寧不瞠乎其後哉余也椎讀斯集而茫然如漁翁誤入桃源苐知桃花鷄犬而已又烏知僊境之幽深耶齊物魏野農妄齊庶物以鳳凰繡毛羽而無時夜之材大象多荷負而少馳騁之技孔孟持仁義而乏覇國之業故窓禽之于鳳鳥劣馬之于大象管晏之于孔孟舉一能一不能二者孱齊嗚呼世何多憒憒之人哉予性不善作字且不欲工字以為字雖工不過一謄文小吏之材耳顧嗜古人書苐產自寒微之能盡讀古人書以窺孔孟門墻為悵至於文章之道尤不能夢見班馬毫末者也而世之人或以通知文理許予而以能工字畫許某且曰某工字而椎魯某解文而拙書一能一不能是二人者正等無異嗚呼世何多憒憒之夫耶夫許予以通知文理予固不敢當然排能抄錄者興通聖賢性理文章者一其等夷尤予所不忍聞也以其擠孔孟班馬而與謄文小吏同儕也以其視孔孟班馬如一謄文小吏也家老人道德文章深入佛祖堂奧顧不能作世諦流布語以媚聾俗而世人且曰天溪師道德高而乏辯說某法師能巧逗愚俗而道法有虧一能一不能二師孱齊是何殊齊窓禽于鸞鳳一管晏于孔孟耶推此而往世之齊物者舉是族也何從覈其責實哉故知魏野農古今不少齊物後齊才學于書工固不幸矣然抑有幸焉先朝馮具區陸敬承兩先生高才碩望千古人也當在內翰林時以不工楷書數為皮相者裁抑甚至不得與名沈顧不列于是乎知埒才學于謄文猶肉相者矣得非不幸中之幸者耶後五百歲有持戒修福者篤至善於末造斯可重任矣葢叔葉而戒善式微有能躬修匪懈者焉吾知其必大可恃也顧覺道橫亘于宇宙當智愚賢否攸均金言高唱于靈山實比戶連家記莂庸詎尚錮身律口之節亦匪崇推錢指廩之輸雖然波離善律首薦羣英之右金色頭陀聿彰分座之旌當聖世而彌祟矧末運乎顧末運亦克逆料乎事何指掌而知也惟金棺潛耀去聖殷遙業非全盛矣然而猶可為也曰歷五百而解脫又五百而持戒長騖有在而異類無多也逮象教陵夷人心不古敻非其舊矣然而尚可恃者曰再五百而禪定更五百而修福動出雖靡而忍善可臻也降此而後五百歲則流漓益不堪矣鬬諍狠戾以肅煞為心侵奪貪婪而唯利是視當此時而有持戒修福者乎是旦暮欲遇之也夫披緇軼俗允宜嚴淨毗尼衰世不然慧心偷薄而五欲公行烝報宣淫而廉恥道絕淋漓擾餞習尚成風俾夫王臣側目而覺道輕微得非邪魔竊僧衣而破正法至聖痛哭流涕之時乎適此而有堅木叉以閑聖化者撥共趨之惡習回久熾之邪風焉斯亦特拔可懷矣且情存超世要必百福資糧庸流反是浚招提以牣己囊槖宰殺耕耘而徧釀惡報計時賣日裨販如來遂爾生遭王法以玷污僧倫斯葢外道秉惡誓而破吾教善逝掩耀無光之日也于是而有修淨善以翊風猷者遺勢利之浮雲樹緇門之標榜焉是亦挺生不類矣嗟乎戒福忽于聖世而罕覯云將來故曰有持戒脩福者言有則騐末世所無而間或有之者亦億萬而僅一二之難得也我思後五百歲而持戒之難也儀型無溢乃比丘師蟲內蝕必且羣攻交訾為可怪矣于此而欲振厥頺綱是一暴而十寒之也疇云易乎再思後五百歲而修福之難也善業唯勤而白衣僻染邪僧庸有寸絲半菽襄其艱乎于時欲行吾道其間比一齊而眾楚之也不既難乎雖然不有其難蔑以昭倜儻非常之彥也乃欲樂者人情之所同好而其能持戒焉貸財者天下之所共趨而其克修福焉我知其宿稟不倫而慧命可寄亦余日暮之所見知者也後五百歲二句季俗有先務在緇白各盡其道而已葢苾蒭精木叉之典淨行崇樂乎三多末法難能也葢有之矣必非庸人矣曩大聖懸覧多方頫觀來葉克仔肩慧命者果何如人與曰必後五百歲能持戒修福者也緇倫濟濟篇聚唯精近事將將樂輸靡倦交克相與以有成吾知下衰可振而佛慧無壅也何則夫真人應運龍象舉深第一義光無論已逮後五百歲而邪魔充斥淫穢橫流任法門者子女玉帛名比丘者宰殺呼盧比比成其邪風矣有能逆眾趨而身嚴儀律訓來學以徂遏狂瀾者必比丘矣斯誠聖人之徒而慧命所恃也我一思之衣鉢付在頭陀殆此歟且聲教攸宣竹林並祇樹經營亦盛矣沿後五百歲而我道寖微澠淄孰辨趨蹡勢利者唯見五欲殷繁介守清操者偏罕伊蒲之供是專襄搆罪之人矣有能輸囊槖以崇樹招提遠邪師以資成正法者必白衣也是必聖人所與而克荷佛慧者也我再思之佛法囑在王臣葢此歟或者謂聞法之眾也修途之廣也寧唯二者之足盡乎曰賢哲雖多不外緇白而末世弘通要必戒福先務也雖然聖人豈不欲天下之人皆持戒而修福哉其如丁衰世勢不獲兼遂也故苟克各盡其道者亦必間生之畸人也畸人謂何能深信般若者而已矣募米供眾疏君子謀道不謀食比丘求法不求飱雖然楞餒不安吾未見其道法能全也丘㛮櫟釜王孫寄食世賢有恒產以自食者或遇神龍未雲黃鵠未羽尚爾朵向人矧比丘無恒產而從人覓活者耶顧武原適當湖擕李之衝而東南多義苑禪藂之匠故擔簦負笈憧憧往來者固喜諮詢之有在然三登九上貿貿道途者並悲宿食之無從不慧曾為浪子慨欲居亭自任其如瓶鉢屢空敢以福田告人夫豈軫玉庵數口誠以安四海雲來葢不慧黽勉為求食求飱之都養庶雲水可一心為求道求法之高流也唯是貨財者天下之所共愛而捨施者人情之所最難苟能捨所愛而行所難自然福不殄而報不貲昔人施七錢而報金輪皇帝貧婆以一飯而為忉利天王豈非以歡喜心不靳傾筐之捨能成就超世外志求佛道之賢歟凡在乘願大檀母讓古人獨步可也閱文苑英華完文苑一千卷總三十五類賦百五十卷詩二百卷表七十二卷九十一卷其餘雜文多寡不齊宋太宗命學士宋白呂蒙正等二十餘人纂集唐人詩文而間收庾子山徐僕射幾首而已葢當時君臣崇文好古意在廣博具瞻故所裒集不無純駁冗繁之累然雲夢巨區固屬偉觀而奇花瘦石不妨幽致未始非古人精神命脈蘊洩結搆而成者也不慧智識暗短天性嗜書憶孩提時遇古人書輙思卒業焚膏繼雖鷄鳴月沒而不忍己自棄去操觚而北面空王則唯躭钁頭苦行而舊聞漏失宜乎無遊觀廣覧之知矣癸丑秋得是書率於小春開篋流觀汎覧至次年立夏日始完一遍嗟乎學無半古識昧三長深文奧義典雅隱賾讀之不解者十五請問乃謙居士者十三或有問予文苑英華義旨何如唯應之曰予何知哉第知文苑千卷三十五類如此而已矣為有玉靜媛落壙安位法語本光獨露清絕點埃性相三千宛爾圓該非空非有即俗即真常住其中坐臥經行惟爾有玉靜媛辭襁褓以職女紅終溫且惠迨桃夭而歸程子宜室宜家溫良恭敬競託中饋賢能工貌德容僉仰閨門儀範惟是自貪結子難辭一十八姨妒雨狂風庶幾早覺無常謝却二十三年空花泡影今則佳城天然香徑埋香新隴葱葱漫道玉鉤塟玉墳如鬲如五尺六尺不落陰陽寧存縫隙一任湘之南潭之北中有黃金充一國環迴巽之龍坎之水護取是玉也大奇有路碧空外勿耽群玉山頭無剎不真常莫滯通靈臺上毗盧橫亘千聖不傳明脫翛然一從照用且今有玉善女人皮膚落盡唯有諸真清絕點埃常光流注正恁麼時畢竟憑何安身起用以拂子打云五百裙釵俱解脫一員龍女帶珠遊為海潮瞻菉禪師化龕法語秋高水淨潔映長天錦斾丹楓色相爭妍性空真火本然清淨驀地相逢性藏斯圓恭惟瞻菉老禪宿僧臘三十餘載翫世五十六年擔簦負笈趼足九上三登東請南詢染指十妙五玄特于海門國內得個消息乃知千如來之生不離此千如來之滅不離此而此無生滅後于海潮院內振厥頹綱式延多知識之禪即于是多知識之教即於是而妙澈教禪謹慎木訥似無用之大用謙和淡泊得隨緣之妙緣乃築乃登百廢具舉設筵設几眾缺斯全寺正喜幹蠱之兒人方羨克家之子胡遽他方華整樂國文成弊屣幻有撒手高騫從是一龕深隱受用水月香雲萬緣頓息空留白日人間今則霜黃葉落體露金風行以勝熱清涼三昧煉將骨人八色流光貴圖性藏頓顯迥脫塵寰且道瞻菉禪師正恁麼時畢竟憑何脫塵顯性以火炬作相云烈火光中瞻色相菉葹堆裏綻青蓮紀六根清淨講章講章平易何必紀紀未異常以自勉也丙辰七月二十五夜熱甚忽夢身陷火宅歷前後左右無非火也房屋崩倒之聲烈烈可畏但聞人語劫火蕩然正此時日自分不免瞑目待盡而已俄見清水漣淪脫身澣濯似乎免難而將陞座說經者然傍有老叟嗔而易予者方余披衣揮麈講此六根淨義老叟雲興搆難予為破執除疑娓娓不倦即講中兩番料簡是也難者聞論遷徙禮伏忽寤講語歷歷起盡不忘嘻殆欲免火宅須淨六根之警歟因書紀異以自勉云圓人位次分凡聖今六根清淨是內凡位由名字中事理相須至五品深位三觀理解淳熟五悔事行精勤即感六根淨相此時六根互用一入六忘能以一音報答眾響一耳徧聞十界無明微細雖未消除猶如磨鏡已去麤塵體光明三分分近顯故其因位名六根淨然不名十信而名六根者良以十信是所歷虗位根淨乃能歷實行實行不勤階位罔克是以圓位乃沒十信虗名存清淨實行況六根清淨遍于十信位也或者難云初信斷見二七斷思後三信位斷盡塵沙則十信之位深淺攸分今秪名六根得無先後混濫位義何存況位位皆有六根淨行又何分十信之別耶答應知圓人明位雖似淺深妙解一開齊平十界五品後心已為深信解相彼時一六宛爾圓通故具煩惱性能知如來秘密之藏已同深位所見況入初信六自在王性清淨故據此且分見思而其內證已是甚深所謂十善菩薩發大心長別三界苦輪海初心與後心所詣一同略有明昧之殊耳其實初信已淨六根後信亦只六根清淨而已非初斷見但淨一二後斷塵沙方淨六也只如登住已去四十一位總曰分真初斷一品亦名行五百由旬到寂光非初住只行四百等覺復行六七百也所以圓位雖分理常如一今家六即深有妙意正發心究竟二不別也夫初後二心尚不別何況中間相似妙解復分二乎故但名六根清淨則已該括十信始終也紀夢并敘丁未長烈予三十五歲初度月也五月小盡夜𥧌去遇有力者強勒合簫皷訇闐爛其盈門矣予以浮囊是重頓首拒辭且詳陳慾愛過惡井井有條須臾而皷樂轉逼如韓侯顧止玄德贅吳狀予心益懼力從稠輩中脫身而窹嘻昔童壽法師幼遇應真曰此子至三十五不犯女色度生當如毱多尊者若有損無能為也秪可才明雋藝法師而已予才明雋藝不翅霄壤什公而淫欲一戒有生未犯此三寶天龍所共鑒知不敢自誑招墮泥梨者今當什公不能自持之年而乃夢中作主是雖偶中然此一戒似邁什公矣嗟乎什師大乘從權益物吾儕小人沾沾以一竇自多濫方聖者其不為什師笑鄙于常寂光中乎爰紀以絕句三十五年春夢中學擎油鉢但持躬幸茲夢亦能辭慾愛染將來庶不逢鷄犬相將各慕雌當年避婦我如癡何咍夢裏渾猶昔昔日心疑夙世基什公風望重當時人主重閽亦被知漫道尸羅無我若化緣差遜毱多師小乘律己大忘身一眚何甞掩至珍愧我半生仍碌碌顧將夢事濫方人法華玄義期齋榜太極渾圇洩輝光于兩曜一乘微妙揭秘密以五玄夫迷方未返端藉指南而覺岸既階自忘法縛殆亦畫象盡意得免離筌之旨乎因知一字寶王海墨書之不盡九旬玄論河辯瀉也無言惟是無言之旨非言不傳有待之機待緣方洽金鷄粟粒佇看天外啣來師子奮塵自向坐中湧出
