body:
  text: 嘉禾楞嚴講寺靈耀全彰著與等菴法師前遣龍賓數名供役原從賈人售得梁極詫為真清烟也弟案無襲固隨即試之色香俱因知舉世間無往而非也一日賣得三担誠然哉比聞天壽大興土木歡喜無量前日龍賓正可付梓人彈線亦一助也委檢書篋得朱提三星寄充圬者一菜師必笑我傾家施也笑笑又中秋前一扎奉訊託友人郵致省來書知為殷仲堪浮沉矣沒痛痒漢不可託些小事業有如是夫聞軼凡師回首甚好然賴餘生為善知識勸導淨業今吾師又餘生之善知識也入室時當嚴加督率母令鞭䇿少緩犯人苗稼總之渠能做得一日好人吾與師甚有功德若造一日業則使之生者皆有罪退不啻如黃魯直活庸人之惜而已也復徹公尊稿出塵手筆也而六即頌句尤超脫鍾竟陵謂僧詩句似生意似脫正非文士所能湊泊處者是也而猥命刪潤豈多欲漆斷紋琴削方竹杖耶胡亂點竄幾首聊博南屏社中笑我有點金成鐵手耳又承以誵訛數端下問正問道於盲也即於明窓展讀對之經論悉皆明顯淺近初非誵訛隱深事也良由近人不讀古教古教翻為新奇亦可慨矣隨問答去聊以塞問未能思七得五庶幾思七得三脫有未愜尊意處不妨書來再商與王晉侯足下妙年天縱志學名成纔離竹馬便列賢書抑廣額屠兒耶吾知九烈君已染兄外服李揆之頭頭第一非獨步矣如弟寒微仄劣寡學無才豈能與諸兄竝驅中原哉亦雄飛雌伏各自適耳管城子十名遣供指揮是雖眇小丈夫然吾兄吐萬言以徼君相之知渠亦有記述不忘之助勿嫌其禿而退之塚也與四弟汝不能力耕勉事舌耕苦守青氈雖似下䇿然古之𡩋越今皆可為禮不云乎教學之相長也則不可耑靠課幾句子曰過生世當潛心墳典志希上進則我雖失之東隅汝可收之桑榆渾以上人企予望之佯瘖假盲不汝勞也與學人比聞爾輩率以絜較後先為參學事此錮疾也大抵學人要以學力虗實為忻戚不當以位次前後為榮辱憶先師門下象龍蹴踏余相從一十八年求一悅眾都講不可得今雖無似然於教觀門頭實亦當仁不讓而彼時頭首龍象亦有瞢瞢無聞者崔烈身居相位人皆嫌其銅臭辱莫大焉庾君每處下位諸生執經就問者集由是以下位為貴榮可知矣職位先後何足憑哉倘有此疾急先治之然後參學復學人省問玄籤序中三事俱屬法門不決之疑略為示明其一問天王越在陝郛之明年甲辰歲者或指祿山稱亂玄宗播遷事則非也此是唐代宗廣德元年吐蕃𡨥亂上避入陝郭子儀為元帥平亂復辟乃癸卯歲也次年甲辰普門師作序故云越在陝郛之明年甲辰歲也即輔行序末永泰首元亦代宗年號代宗立四年改元永泰故云永泰首元又云興唐八葉之四載也其二問十子既往者或指關中十子或指十大弟子或指菩薩子所謂一國三公吾誰適從耶獨天溪老人指定章安大師名灌頂乃第十灌頂王子位故曰十子則於序文起伏脉絡貫通千古特識也不必更有疑議其三問普門子三字者或言普是其名據序中普早歲在塵句也門子二字即門人之謂儒禮以嫡子當門者為門子據束晳補亡詩內粲粲門子句也或云門是其名據統記中列門師二字也然皆摸象射覆法耳須知普門二字皆是其名子字即弟子之謂字曰元浩義興人初業儒與梁肅友後為荊溪入室弟子文苑英華第七百二十六卷內梁肅送沙門鑒虗歸越序云東南高僧有普門元浩予甚深之友也相遇之際幸說鄙夫擾擾俗狀且當澡灌心垢再期於無何之鄉明文宛在非胸臆談也他日統紀中亦當註清以除後疑因屬法門關係不惜委示古人問一得三子亦問三得四矣又閱汝輩來問若于條強半淺易典故或法門名相異日留心教部染指書史當自瞭然不必瑣答姑擇稍隱深可疑互出不同者數條書去其一問乃今台賢濟洞各有法派故一稽名而祖孫父子尊卑不濫何六朝唐床之際字派混濫如天台大師名智顗而弟子亦名智越智朗等耶答古人重在德業道行不屑屑於名字行派之間較絜等級故四明慈雲同出寶雲門下而一名智禮一名遵式之不同也推其行派昉於明太祖分封二十五王於洪武十八年天書廟授之時各籓俱賜二十字系派如燕籓則曰高瞻祁見佑厚載翊常由慈和怡伯仲簡靜廸先献正玉牒分光天潢衍派也夫禮樂征伐自天子出自君作古法門亦皆仿之以立字派則台賢濟洞法派皆始於明初不可貴之於上古也其二問日觀二字此問不清為復問人乎地乎法門乎日觀有三出不同今俱為書出一是地名太山東南之地名日觀昔秦始王封禪至此刻石銘之後漢武帝亦至其地探得玉䇿出文苑英華八百七十八卷崔融少室山少姨廟記二是人名南宋既沒有溫日觀者隱於西湖之瑪瑙寺側善𦘕葡萄博酒夜常大哭元丞相脫脫欲一見之不可得出遺史三是法門佛令韋提希夫人修十六妙觀往生西方第一日觀第二水地乃至十六上品上生觀佛言欲生西方先觀落日狀如懸皷心想不亂開目閉目常見紅日名為日觀出方等時佛說觀無量壽佛經此可謂問一得三虗往實歸也其三問予詩中四月桃花嫩三春桂子紅者四月桃花白樂天遊廬山大林寺詩云人間四月芳菲盡山寺桃花始盛開每恨春歸無覓處不知轉入此中來是也出白樂天長慶全集及文苑英華第七百一十一卷三春桂子者桂有三種有菌桂牡桂出賓宜韶欽等州三四月開花今南方八月開花者但名桂而已出胡赤坡癸籤其四問三多二字此有兩出若緣覺人能侵習氣者由百千萬世觀因緣及見佛聞法作福多故云深觀緣起久種三多福慧既隆預侵二習是也此三多屬小乘出四教儀集註第六卷末若華嚴云無邊福聚極善清淨句虗空法界靡不觀察句十方世界一切國土所有佛興咸勤供養句清涼疏云一淨福清淨二智觀法界三近勝緣是為三多出華嚴經世主妙嚴品卷五之一讚如來師子座中光流菩薩之德也此屬大乘三多如詳解中所云三多之妙行遽階者是也其五問囝字音義者此是閩中鄉語音蹇蹇即子也閩中子呼父為郎罷音擺父呼子為囝出胡孝轅癸籤彼有郎罷別囝囝別郎罷詩而月泉詩社中有郎罷歸來呼囝食阿婆睡起問姑蠶即此也其六問客秋素先來書內有百病作楚竟為精衛矣句不知精衛是何物者盤古以後軒轅時王生一女甚美麗名精衛公主及長雅好神仙之道遂訣父母至海求仙至中途遇一男子亦甚美麗遂起欲念我至海求得仙道回來當與此人為夫婦海仙知之即作諸魔眾病以懲其心精衛不堪即退求道之心而返出開闢異跡今素先書謂不甚眾病竟如精衛公主退參學求道之心也其七問三花者漢世有道士自外國來將貝多子於嵩山東太室四麓下之有四樹一年三花白色香美李詩云二室凌青天三花含紫烟者是也其他所云三種花三色花者皆無稽之談老莊所謂子姑妄言之吾姑妄聽之者也況此出屠赤水瑜伽召請道士類中三花九煉天曹未許標名之句則赤水博學之人言必據古自當用外國道士典故方為親切然李詩云二室凌青天者嵩山東名太室西名少室相去十七里耳總在嵩山故李詩以二室三花為嵩山寫照對也其八問天生來書中有瓶碎可喜句不知何意者夫世人能碎千金之璧而不能不失聲於墮甑故墮甑不顧者即為世間曠遠之夫也不顧已奇矣而復云瓶碎而善者當知屬譬喻也昔有二女各持一瓶出城二皆打碎而一喜一憂憂者酪瓶以未𤚲酪出故碎則憂此喻破戒未得道命終則失道故憂喜者漿瓶已𤚲出酪喻已持戒命在固善命終亦閒如死法思法兩種羅漢以死為喜葢命終即得無餘涅槃必無退轉故云瓶碎而喜也出大經會疏十六卷梵行品其九問三平兩滿文義者此是尋常方言從來官倉收米皆用斛一斛秪容五斗而旗軍求多之法斛斛必皆踢實過益所謂踢斛淋尖斗斗過滿之法也今言三平兩滿則五斗中但取兩斗滿盈三斗平口方是適中知足之道如念菴詩云與其十事九如意不若三平兩滿休葢以人道忌盈鬼神惡盈高明之家鬼瞰其室故凡功名富貴者皆當自知止足急流勇退如三平兩滿適可而止不當十事九快貪祿妄求也然檢念菴集內元無此詩想後人託重念菴而為之者耳又張素臣珊瑚鈎詩話內載劉仲原得二銅斛於左馮翊皆容十斗者此偶然之物非官倉收米常斛也其十問人言夫子斥魯非禮及云婿之父母死乃辭女令別嫁他人有諸否乎何所出也答有之一出禮記第三卷禮運篇中云魯用郊禘非禮也一出禮記二卷曾子問篇內云昏禮既定吉期婿之父母死乃辭女令別嫁他人恐誤女之吉期此其所出也然孔子生於魯居於魯雖知非禮必不如此明斥況令女別嫁則婿家如何出諸口哉正左氏所謂非君子之言有謂言之也況此經既由門人記錄於中不無紕繆此紕繆之尤甚者也不可執此數語便謂夫子有斥魯之非可耳其十一問詩中夢眾維魚矣何故實維豐年者蓋春三月間鯉魚生子於岸不及出生明年春水復至此岸則子皆遇濕而生所謂魚子不經鹽漬三年猶可復活故魚多則雨水調均豐年兆也若次年之春水少不能及岸則魚子悉化生成蝗子書所謂魚子化為蝗是也故魚少則蝗多歲祲矣雨水不調年糓又焉得而豐哉是以有國有家者夢魚多即豐稔兆也出陸師農埤雅推此即知魚一類耳乃具三生凡魚生子後母魚不想其子子即爛壞子生由於母想此想生也化蝗化生也逢水濕生也引申類長天下之能事畢矣其十二問惡口車匿梵王法治此何說也答此無說也昔梵王甞以四十二字教化天下嗣後人多蔽惡不受教化梵王即收四十二字入口總不語言佛臨涅槃慶喜問惡口車匿何法治之佛意謂惡口之人多諸惡辯若與言論轉增惡見當如梵王總不與言默而擯之足以治之矣是為梵王法治即律中之默擯也昔孔子三緘金人之口而銘之謂之磨兜堅者亦無說之意也已上隨問擇答計十二條皆經書中稍隱賾義異者略為書出倘能挹流尋源即可博通儒釋矣書倦且止復可中師承諭云云弟謂不然覆講一道雖從正座語氣大貴各出神襟非但咫步繩趨効鸚鵡學語為得也故每輪次及弟必稍出經意翊贊師門而眾口狺狺吠弟狂妄國狂矣予焉得而不狂哉無足恤也至云當回避頭首職事稍損辯才為明哲保身之誡敢不拜嘉但嘗及講時意之所至信口而出如箭之在弦不得不發不惟都忘尊諭又犯頭首之忌此溫庭筠多讀南華第二篇不免遭黜下第之同罪也鮑照累句參軍垂首竟不能學柰何柰何與龍媒護法門下以不世出之才宰煩劇之縣而事皆迎刃異日者地以人滋重矣有人自維揚來即問新江都治態莫不岐舌交口以頌駱清天廉能政績夫讀書數十年而用在今日如此錚錚卓卓真足與聖賢心事頡頑照映矣百練剛而為柔指繞者謂夫易始而難終也能不以他日窮窶為念則盛德大業自然炳耀千古矣眼鏡寄上亦知比來有十倍佳於此者矣第不敢侵疇昔然諾聊以塞責餘無所云與沈輝東秋窓牢落每憶此君清蔭分來惄如頓解但圃久就荒尚多餘地更欲請益成林竟忘一之為甚矣想藥欄中列前後左右無非君子不靳再遣數名慰我相思他日猗猗滿徑仍可遣歸杏林奉侍孝子也與戚朗園護法門下美才天授年少登庸此於天地間無少缺陷事獨庭虗謝玉掌失韋珠為不豫耳今幸舉子氣便食牛萬事足矣睟期伊邇提戈奪印時大宜戒殺放生以廣生生之道法名馳上聊當五色絲繫郎君臂助間且祝步武天衢也不一又賁臨遽別不勝歉恧知留亦無以永客歡也稽康入座左右生光門下惠然可與匹休千古矣比遇諸同人皆承惠愛慇慇知門下為我先容或為緩頰福田利益間也謝謝榮授既定中元後祈嗣懺集訂朔日宜矣領知年復復曹石閭護法西郊別業在不肖原屬無可無不可者耳過承門下與諸公鼎力贊成且爾應允今已復渠自住即沛老數金亦已酬彼口頰之勞矣身外物耳不足言也但際此可笑人境令人益千峯萬峯之想耳又憶去歲中秋弟於府中商酌尊那懺法竟則海上翱翔而歸一大快也今歲中秋駕來荒院修禮懺法三日清心兩夜話月亦一大快也即奉和八日拙詩明日黃花蕊正肥之句不意又為門下燃黎佳讖謂之不快得乎承招河魚之疾未瘳而四肢輒復不佳勿克奔命因知快事不可多得非敢援政黃牛國土筵中甚不宜之語自高也宥之又小品之說從密邇眾信之請也門下白香山蘇端明儕輩故以一柬相招毋靳朱履破苔痕且屈惠文為操杵將軍耳張陸諸公拉之偕來天龍八部不可少也一噱與汪天真余自落䰂以來滿意十畝之間衡門泌樂了此生矣不意天溪道中荳麥糜爛家老人門下學子歸投嗸嗸待哺余為飢驅出門此項又不得不為眾人屈矣足下向有此志當不靳傾筐輸我論其數要如韓信將兵問其予願如枚皐作文又損米多斛殊覺有待之為煩菓餌見詒復愧口腹之微累故人也謝謝承諭作書通某某寄去久無報章亦無用報章也昔王修齡飢向謝仁祖乞食不從陶胡奴索米者葢以小丈夫不必勉與作緣耳天真知我當不罪我氣傲也與門人馮巨區與達觀大師書云俗人愛錢甚於骨髓檀信善根大須將護緣簿不可輕發化主不可輕遣予住院以來拳拳奉教故雖兩處興建斷不出一梆一板取憎世人汝輩繼席守成決不可起意外希須之念葢比丘閉戶修行自有天龍呵護即天龍恭敬不以為喜何必僕僕闤闠玷辱法門耶又若輩守成院子立身行事皆貴乎正行事苟正不惟無恭於佛抑且不忤於常人余屢更菴院至則同袍必側目交憎如馮巨區所謂鄉學究乍遇衣冠偉人輒生驚懼不暇與之施揖讓通姓氏而避之惟恐不遠絕之惟恐不深意謂其必奪吾子弟而去也吾子弟或俱舍吾就彼也及住之年日則送禮慶喜吾不閑也盤盒扳援吾不能也歲時貢獻吾不行也然亦有一二本色道友稍稍慰藉不致餓死而有為善舉亦往往以成善舉雖成而眾人交結之檀信猶在也然後知吾不與雞騖爭食者故比比相容而不肆怨謗矣正之一字能順上安下有如是夫其終身行諸與學人學道人斷不可大言不慚輕議一切每見學地中輕短上人佛法及至自己臨座語多紕繆平日議論上人世諦及至自己下流尤甚平日憎惡常住淡薄及至自住把茆并粥飯亦不欲人喫所謂鮑老當筵笑郭郎笑他舞袖大郎當若散鮑老當筵舞轉更郎當舞袖長靜言思之豈不慚惶欲死耶此皆學人薄福通病不可養也試自做到十分田地然後批評一切未遲然做到十分無玷者斷不輕議一切也與僧幢汝師雖一時執見得罪法門然在汝師徒也天下無不是之師長可善事之昔大舜祇載見瞽叟夔夔齊栗克盡事親之道雖瞽叟亦允若矣慎勿仍前視為冤家結孽也即是冤家亦當解結散場豈可重打結乎至於死生去就自有定數不必沾沾在念也與晉揚茂才向知晉揚為天下士讀佳文又知晉揚之有妹矣讀書解義曹大家流亞也知識孔明桓少君頡頏也班昭踵成兄書以完兄名足下表揚妹德使妹不死皆千古美傳然靜媛所以能千古不死者得附乃兄青雲之士耳亦幸矣佳文稍加珠墨無任唐突西子不日市中紙價躁矣又弟僻處海陬不聞市語久矣行僧歸言足下今年政三十憶總丱竹馬昨日事耳不圖彼此皆際中年驚詫久之然又不知何日月生也忘年之友日月不知宜矣破衲之外無長物磁壺一握聊將壺天日月之識拙詩一章未可汙目俟把晤時口號以當華人三祝復冷關老師會城講席隨緣而應雖云量而後入然未來美惡孰能逆料其何如哉人生出處要如流行坎止行於其所當行止於其所不得不止不失其正足矣又何可以成否論是非耶家老人慈愛門人正如鳲鳩七子其心一兮者也而萋菲諂忌屬垣貝錦苟非吾師讜言正色以銷羣小讒嫉則幾傷老人之心矣先朝成祖囑胡濙書仁廟事奏濙以慈孝七事上聞上疑氷釋倘遇詹徽文皇子即高皇子矣正人君子不翅調和鼎鼐雖家人父子之間亦賴籹寧為德何如哉復引岩子頒來文集篇連月露句挾風雲纔一展讀光芒陸離莫測端倪水神乍覯海若方存乎見少之知而論欲玄宴我乎愧甚愧甚夫陳師錫之敘五代史不足以重歐陽修業已取譏當時矣而使著屑佛頭豈不殆有甚焉者乎倘難方命姑寬假之俟不見賈生久自謂過之而後可學吳蠶作繭緒其尾也又手札至獎借過實益深愧恧承問隨緣集內詩篇太少者昔人謂詩能起淫我出家兒尤不宜躭咏也故往往戒筆至疑弟閱歷交游不滯一隅何贈答寥廖者鍾竟陵督學閩中先見陳白雲今體七百首欲物色之而己物故矣入境夢陳白雲晉接鍾曰詩外更有交乎曰朱百朋曰何交乎對曰亦寄食耳然則何以不贈之詩俛首不答竟陵曰先生之不得已與不苟興槩可知矣謹復復朱茂才昨日講期不來知愛我也倘遊雲驚龍自天而下則小巫見大巫而氣盡奪雖欲措辭不可得矣翰教領知謝謝至云有所疑問世無知者不知其何也正東魯一孺孰能與夫子中分者乎可知矣復范黽公講期極承弘護并損多儀感愧無任南㵎近詠清明正大文質彬彬晉魏妙手也見詒詩箑氣侔文正書逼允臨而溫厚自然溢於言表司成不死矣尚容作巴人下里之號以當報瓊也謝謝與神山和尚家山說教亦迦文觀樹經行智者旋荊答地之意耳元欲先至寶所借三椽為平原十日留暢談今古而後赴普明之約不圖好事多難時不我與倉卒先起小品之說矣遣下職事先一問訊期畢即翱翔而至借道場為東道主細探苕霅碧浪之奇遠眺蒼弁諸峰之秀昔人謂華山呼吸可通帝座恨不帶謝眺驚人句來搔首門青天弟則無所恨矣何者自有老兄驚人句子在也與死心禪師不慧髫年失恃即志披緇以報罔極今且顛毛種種矣尚未酧劬勞之萬一而座下一菴深處乞食供母真與編蒲擔母者並轍而爭光者也顧不慧抱終天於沒後而座下供甘旨於生前其為人子之忻戚賢否為何如哉白米五斗聊充北堂一粥之需母以供人匪克孝而麾諸三門之外也興蓮居法師不晤久如中心若渴頃聞法從復主蓮居喜而不寐在事則輕車熟路於人則風虎雲龍法道昭明於斯為盛不腆遠將聊志栢悅復南屏和尚承遣云云指日即東范文翁極口頌和上佛法道德天下第一且於秣陵理內得覯神情超脫拈頌清新甘露滅至貶所而識見大進信不誣也所委領知但以和上年高德劭身外瑣事可不留心如國手棋不必段段用意而了局終必是贏可也未遑走晤先此遣復不宣復雪渠張護法捐資施食普賑幽魂感刻之秋不獨貧道一人而也謝謝至諭頓覺師事深見門下欲流通佛乘不昧果因普心惓惓溢於言表真現宰官身而為說法者也今而後嶺表得瞻全藏皆先大人弘願克始吾護法正論克終之盛德矣即先大人作賦白玉樓中不藉此以增無量智慧才情哉謹當依教趣渠東轅也不儩與指開法姪座下以強仕之年屢建法幢講聲遠著剎竿高出真是吾家千里駒也不慧恭居眷末與有榮施楞嚴初住凡百蝟集未遑爐茗暢晤先遣子姪輩過聆法音菜資不多將我推重之忱而已亦二簋可用享不在享多儀意也復杜吏部王烈登山林泉增色門下枉我蓬壁生光矣苐不能解玉帶鎮山門有愧機鋒鈍置耳怱怱別去佇想方勞書米頒來調饑頓慰門下氷心啟沃受知宸內孤風高節孚及方州何物山僧能消清官玉粒哉姑率比丘輩稽首慈雲以祝麟祥早著為報也與文可智覺禪堂等兄伊始余寔克終堂殿齋厨率自剏有居遠城囂無刁斗之患民多純朴有太古之風於以養道躁競不堪夫骨人宜骨山肉人宜肉地在汝孱朴常住攸宜頭陀之選不外吾識書至就道余惟不疑無卜也
