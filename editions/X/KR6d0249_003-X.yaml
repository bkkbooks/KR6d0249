body:
  text: 天台耀老人囑付不藏闍黎衣拂囑辭一宗妙解非博聞廣誡莫能會其源三觀圓修須罙究研幾庶克臻其要是知佛祖慧命斷非膚受淺心者所能傳弘也不藏闍黎氣質渾厚操履超脫久歷南宗禪席遍參性相法門雖遊觀廣覽不棄多聞而秉志傳弘寔欣性具癸丑歲從余靈芝海潮稟法華佛頂之旨恍然識教有所歸行有所統遂悉心大小教部咨究妙宗旨要諸書皆於言下得意冥契夙心如慧成之遊深教苑而終歸南岳方行滿之初叩丹霞而悟賴荊溪夫解行既遜須勤自行教觀脫手事貴利生是以將天溪和尚所傳衣拂用付與之所期解融眾教會沼渚江河而令成大海行空諸有破自他共離而獨露無生援四隨而濟物使種熟脫機時時受潤秉三軌以弘經念衣座室誡在在昭明繼五宗無綫絕之虞俾佛種有綿延之慶庶不負從上佛祖所以囑望後賢之意也付愚原睿子衣拂囑辭一家傳通之旨三部俱重觀心三軌弘敷法化攝機首貴慈和則知佛祖教誡率以慈行為先而解寔副之矣愚原闍黎天資頴悟博聞強記剃落護尊潛心具字殆亦有願而來者乎向以快快三吳無足可問雖抱冲霄之志且歛出塵之翼癸丑受余佛頂之旨以為咨詢有地奮志悅隨稟受大小諸部聞中識意得吾心之獨見隨聞法華佛頂諸席講聲清朗起四眾之欣聞苐以苦行尚慳慈和未洽似乎單輪隻翼解行不純為可惜也然於樂說門頭可當一面謹將天溪和尚所傳衣拂用付與之所期仰遵佛誡御物慈和精心觀行高剔祖燈使解有行本則覺道可升行有解導則弘宣無壅馳二輪而遠致翥兩翅以高飛庶不負子之夙根余之囑望也勉之付慧昶輪子衣拂囑辭慧昶維那勤而喜博可以語上之人也丁未已前余輔大覺老人理中外事重請啟講三部即負笈來參惟是賦性遲重天機未深然而志存強記法法求精非泛泛人也時方遊歷濟洞諸宗略無專屬癸丑已來遂從余傾心教觀朝晡咨疑於玄文止觀妙宗指要諸部靡不聽受持文貫義之下特喜宣弘雖曰少不深書靈辯或遜然如愚公移山勤而決志未有不感應終遂者也是以將大覺和尚所傳衣拂用付與之聖人云譬如為山未成一簣進吾往也今而後無然畔援無然欣羨決志圓宗益勤妙解自然時至理彰庶可以無礙慧遍利未聞也爾其勗諸付文可社森二子合卷智瑞二子皆於癸丑年負笈相從之人也資寔中材學堪語上純謹安分深藏晦養慎言慎行惟戒惟乘飲光卜生流亞也特以弘辯稍巽天機未深故久處學地而未之為人其亦喜居學地而不汲汲於為人也然窺其覆說論義之下雖無奔越絕塵之足不失步趨程度之規殆亦謹慎性成而學知有餘者也夫時丁象季法道寖微不患無聰明才辯之人而患無躬修實學慎重韜養之士耳若二子者可以為人矣爰以大覺老人所傳衣拂用付與之惟是養之於獨者將以涖眾自當因慎而益深其慎學之於己者方以利人固宜以精而益求其精勉之哉代付餘生月子源流法運流行斷而復續如連崗斷嶺地脉攸通者似有造物天龍為之陰相不可得而思議也桐谿法祖門下象龍蹴踏而首出高弟為天柱但月先伯但師早世衣拂託重天溪老之覓機授受而且未定其人也吾等菴法兄北面天溪悉心教觀者閱十五年所而大通台旨先師竟以但師衣拂付之人頌天溪有繼滅興絕之德而為法門一大艶傳事矣等兄急智祖三術勌入鄽垂手自韜有餘之才人悲未意其用丙辰初秋乃以衣拂託予遠應他方華整而去源流又幾乎息矣智覺餘生月子向與等兄臭味頗同參隨有稔從予數載乘戒既急年學兼長山家法脉不可使一枝有久替也遂以等兄衣拂付傳弘夫北齊遙承龍樹無極直追太極道統法脉滅息而後生息今古同然其間一綫不絕實天龍為之陰相不可得而思議也古云改玉者改行既仔肩祖道當益深教觀裕後光前母負佛祖負己靈又予之所囑也代付勝果因子源流得法於天溪老人者數埒獻公之子求有如重耳其人乎無也獨格文法兄厚重純粹德勝於文不幸早世沙彌勝果年在驅烏未之志學癸丑春始從予聽講靈芝予以格兄之徒也著意汲引隨歷海潮淨慧講席稟聞妙玄止觀諸書年事甫壯而朴厚好學綽有父風頴悟機辯居然跨竈今又若而歲矣年益長學益進而辯才益流利邁倫格公不死矣夫盛德之後必有達者以厚德而生純明或造物之報施不爽歟宋王祐有大功德於朝廷而不及為太平宰相手植三槐曰我不做兒子二郎必做今格公大志未展而收功於其徒亦猶是乎遂付與衣拂囑嗣格兄如雲護蛟龍支股間雖似斷絕而血脉終是貫通也或謂格師不祿衣繳天溪十餘稔矣勝果受學受衣俱在玉菴而今使遠嗣永福無亦顗晉文繼絕之功而於為推己及人乎非也予僅如十月嶺梅無力早花偶有三五門人而實軫諸兄均不嗣也故昔為養育造就今為付囑承嗣者完予始終孝友志耳既相忘於彼此又何意於徼功哉且為格兄子不俱天溪門下孫乎搦管至此不禁淚涔涔下矣付伊輪圓子衣拂囑辭解目行足自行可以遄征義貫詞宏化他因之不壅二者不可兼得吾寧先行而後其言伊輪上人參研教苑閱歷三宗以為滔滔者天下皆是也故率易祿而難畜乙卯從予稟法華之旨遂謂息心有地決志依隨如迦文之遍歷阿羅諸遷而枯坐雪山頂上無盡之翱翔濟洞五宗而降心兜率室中數年來慧解日深而辯說未進稽其舉措步步實地而不汲汲於語言文字間此固先行後言之用心也但未免單輪隻翼之誚耳雖然覺場十弟豈俱身子滿慈孔門四科非必宰予子貢各取其一端之長而已因以天溪和尚所傳衣拂用付與之韓子曰水大者物之大小畢浮然則慧深者言之淺深皆當爾其精進自行使義貫而詞聯自然時至理彰可發辯才而揮化矣定慧雙弘政在子遄征無已而已耳
