body:
  text: 隨緣集敘緣從外來非本真也隨惟偶應非專屬也夫人之相與俛仰一世有悲歡離合貴賤窮通禍福凶吉升沉倚伏率外來也而人則因外來而亦悲歡離合倚伏升沉矣復因外來而有言則如馬遷之史瀧崗之表元亮之歸去來太白之桃李園孟德之橫槊漢高之大風阮狂之哭成公之嘯皆偶應也比猶太虗雲騰鳥飛風動塵起日輪則明雲霧則暗戶牖則通牆宇則壅分別見緣頑虗則空𡋯之象則紆昏塵澄霽斂氛又觀清淨究之太虗體非群相亦不妨因外來而明暗塞空又不妨因外來而有聲則以鳥鳴春以雷鳴夏以蟲鳴秋以風雨瀟瀟而鳴乎其冬亦偶應耳寧惟人物乎哉西竺空王已渾全本真永謝外務矣其如有世界生善治惡入理四種外緣來感亦不獲已而有相則現生法報應之身又不獲已而有言所謂生生不可說有因緣故亦可得說生不生不可說有因緣故說不生生不可說有因緣故說不生不生不可說有因緣故亦可得說矣予猶人耳寧無外來感觸亦有偶應之言門人裒集成帙以乞名予曰我無特操我無專屬而言者又非本真也其名隨緣可矣因編類為四而削去十九雜著存十一尺牘存百一詩偈存千一而源流則具存也徐孺子曰周易稱隨時之義大矣哉以剛來而下柔動而悅隨天下隨時而大貞亨隨緣之義取諸此乎予曰不也予卑卑雌伏言不出羣殆庶幾於易之澤中有雷隨以嚮晦宴息耳己未中元日楞嚴講寺比丘靈耀書於大樹方丈隨緣集目次卷第一自序雜著泗水海花記佛海和上隱山序金剛經部旨序摘微總序摘記五經章意序藥師經直解敘梧桐月記摘百家敘摘佛經第一敘普門膚說序集註節義序盂蘭盆經折中疏序玉菴興建緣起題玉庵交單同戒錄序因辰春期讀隱秀軒集閱鍾子評選史傳詩皈隱秀軒集翁永年書法敘大藏集廣疏閱元白全集血書法華經䟦睿公裒文引言普薦罹難陣亡橫死軍民榜復靈芝耆宿公啟復寂照諸護法公啟復陳曹諸護法公啟卷第二與徑山化城寂照兩常住修刻大藏書復吳江象護法請修藏板啟附來啟修刻大藏經板疏復淨慧監院公啟復淨慧諸護法公啟復永壽院檀護啟天溪和尚傳餘生字說題報恩院交單智覺寺重興禪堂緣起題智覺交單修井文蓮華賦為玉菴住持愚原闍黎封龕題市居漫咏集齊物齊物後後五百歲有持戒修福者後五百歲二句募米供眾疏閱文英華完為有玉靜媛落壙安位法語法海潮瞻菉禪師化龕法語紀六根清淨講章紀夢井敘法華玄義期齋榜卷第三源流付不藏闍梨衣拂囑辭付愚原睿子衣拂囑辭付慧昶輪子衣拂囑辭付文可社森二子合卷代付餘生月子源流代付勝果因子源流付伊輪圓子衣拂囑辭卷第四尺牘與等菴法師二章復徹公二章與王晉侯與四弟與學人復學人二章復可中師與龍媒護法與沈輝東與戚朗園護法二章復曹石閭護法三章與汪天真二章與門人二章與學人與僧幢與晉揚茂才二章復冷關老師復引岩子二章復朱茂才復范黽公與神山和尚與死心禪師興蓮居法師復南屏和尚復雪渠張護法與指開法姪復杜吏部與文可隨緣集目次終
