body:
  text: 嘉禾楞嚴講寺靈耀全彰著泗水梅花記梅之見聞於世者吳曰玄墓鄧太尉玄以遊以穴之別業也杭曰孤山林高士逋以餐以妻之隱居也皆載於志記傳於雅俗者久矣而獨吾鄉泗水之梅於志記不少概見何哉無乃去郡遼遠僻在山村既不便於遊觀故山史亦失采輯如天台之不列於五嶽闕載於常典之謂乎泗水在吳興府治之西南三十里菁山之北麓焉傍山百十畝皆植梅居人以梅為地利故不加損折不雜他樹當春陽暖發豫有時歸鄉則縱往觀焉凝神一望繡色迷天把茗長趺錦茵逐地香魂襲襲常恐羅浮入夢墜瓣徐徐想到壽陽額上掩映參差杳迷出處低佪歎咏絶欲忘歸且北臨泗澗時浮清淺之溪南負青山益顯氷霜之秀而深遠之趣廣濶之觀有非一時心目所能領略筆舌所能殫述惟曠懷者自得之耳要之孤山玄墓亦遜揖下風者也然豫重有感焉當孤山玄墓之梅放則蘇杭士女結駟邊騎絡繹縱橫紛紛觀賞藉藉稱傳雖婦人小子亦知有二處之梅矣而吾鄉泗水無聞焉與伍唯一二山樵地癖罕有知其臭味一為歎賞者豫方徘徊諷詠其間人皆指顧而笑曰是子癡與今枝頭未實何乃妮妮此空花為豫笑而問曰若輩對此寧不樂乎對曰去年猶不樂豫曰何謂也曰青梅價賤耳豫乃戚然而嘆曰均是物也天何獨厚於彼而過薄於此乎既而恍然笑曰均是物也天何過薄於彼而獨厚於此乎蓋二處之梅雖為人見賞然玄墓則奇枝秀幹即為遊人攀折者十八九餘唯庸枝禿幹而已孤山則腥風雜遝而香魂虔劉一空矣吾泗水之梅翛然無恙也得非晦養深者悠長榮華露者摧傷歟豫聞泗水之陽宋季為顯者之第也今則掬為茂草土人時有從钁頭下得其遺簪墮珥者豫見泗水之左國朝為范殿元之它也陽春聳峙層閣翬飛今則町疃鹿畼狐狸穿屋矣而泗水之梅固挺然全盛也嗚呼豈非晦養者悠長顯露者摧傷之大章較矣乎又豈非天之獨厚於此者乎是豫之所以重有感而且欲記之也夫玄墓孤山梅既不堪矣而世尚藉藉傳聞者徒以鄧太尉林高士之重也今泗水去郭既遠遊觀者難之未遇幽人歎賞者其誰是此梅抱獨拔之奇而世則終無聞見矣豫是用一言以告夫來之探奇者使知吾鄉泗水之有梅蓋天所獨厚而山史不可闕載以俾梅魂抱不遭之歎終笑世無曠懷者若謂比鄧林之不朽於玄墓孤山則吾豈敢佛海和上隱山序隱山比丘之常也惡足言言夫守道恆一而利生必溥者耳蓋僧之無識而在山者可言山不可言隱若見道已明而懼其未固或用世之才疏而人緣猶未洽也則就養於山以需之乃可名隱或有隱而未久遇薄緣而一感遂出營營焉汲汲焉世諦流布而彌見其不足疇昔名高一旦隳矣如世之指終南為仕途捷徑而致北山之檄者比比是也何哉蓋守道不恆而秉志不一也若是者雖出吾知其見必不明養必不固用世之才必不充所化之機必不溥而於法門亦必無卓卓裨補樹立也古人云在山為遠志出山為小草譏夫出者不如不出者之為愈也斯蓋名為隱山而非真隱山者也真隱山者其守恆其志一世不苟出出不徒然高峯妙石屋珙而今之佛海和尚此其選也豫幼而披緇即聞湖海衲子藉藉相傳有秋衲禪師見道精明異日化緣必不聊爾豫時敬慕欲一見之而良無由緣越數年獲交師之令師仁源乃孫福城於武原之資聖言師已得林野老人之法印隱於吳興之菁山深處者十餘載矣豫恍然喜曰菁山吾鄉也何幸駐高人哉吾當歸而一禮之矣既復自憂曰師見地明白久為海內推重必且應化多方去矣吾雖歸恐見之不逮也及歸而訪諸慧嚴古址則更號為佛海矣而身固未出也師賦性嚴正不苟失言色與人而不以豫之鄙陋止豫宿談且達旦油然莫逆豫心及出隱山詩偈見示豫則目眩然而不眴舌嬌然而不下蓋不惟見道精明抑且綽綽乎具應世全才者也又十年而今往見之其養益固凡四方道俗及吾鄉之有識者咸望師出以灑同雲之潤俾草木昆蟲皆知佛性而師固恬然無出意所謂潛龍在野確乎不可拔者耶嗚呼見道精明久為海內衲子推戴加以養道之固充以應世之才緇白顒顒然望其化道者幾二十年所矣而不出豈以見不明養不固才不充感扣之機不溥而不出哉蓋以精明之見貞固之養充裕之才化機之溥積之二十年而猶然不出然後知其守道恆秉志一而隱山之真者也然貞固足以幹事異日者天龍不容師獨居有餘不得已而出必將一鳴驚人振作聾瞶方之娑竭羅龍霔雨溥利生民如世伊尹武侯世不苟出出不徒然其所樹立必卓卓可觀而于法門必非小補者也豫故頌之以言不然隱山比丘之常耳惡足言哉金剛般若波羅蜜經部旨序金剛般若義旨深圓靈徵頗著故解釋流通者無慮數百家雖蘭菊各擅稽其起盡轉轉因襲十同八九再三討玩似乎佛語仍煩脈絡少貫每臨講授終不釋然方閲般若大部探得旨歸以臨此經若合符契蓋以真空慧觀蕩汰小疑會八十一科皆摩訶衍是般若部旨也輒用隨文點出義有餘裕文無剩字宛然驪珠相抱矣惟是語氣粗直略無文藻文理明白處即大章不舉宗旨深隱處雖一字必詳正欲雅俗共解經義易明耳冠之以科者務在文言皆有位置血脈前後貫通不使貫花仍散漫無歸佛語滯煩重之纍而已敢言斯解之異於先賢哉摘微總序大玉山人自志學之年遂與古人心迹語言酬酢晤對於爽然會心處則挹其精鉤深索隱處則竊其妙浩浣磅處僅記其細廣大難思處姑掇其小日積月纍紙帙遂繁群分類聚得十册總目之曰摘微行住必俱稽檢是賴為良師友與之終老而已夫初中後善純一無雜青蓮出水喻法微妙也弘汲引陶誘多方剖判有致則繡淡精微法源道統列聖攸傳一線不絶則道心惟微道格天人則極廣大精微之致幽贊陰陽則垂潔淨精微之書微文小節每見於童蒙曲禮端本澄源復存乎夫子微辭洎乎子史百家心之妙會發之于言言之精微録之為文故四種心識率以積聚精要者謂之文心凡是族也何莫非古人心迹所存山人從而摘其精微焉是摘也又豈一時一處所能遽集哉或晤對于明窗淨几或披覽於鄴架揚牀或揖讓於講壇論肆或招邀於午夜寒燈或適會於晨熹夕月或邂逅於雪案螢光風兩晦冥喜逢君子樓高月白快覩庾公匡牀宛轉識陶潛之挽歌切己高山遠矚憶謝眺之句子驚人雪滿山中偶閲士高之傳月明林下忽翻百美之圖紆袈黎而臨堂殿槃談佛祖潔爐茗以引縹緗頓首聖賢或傾蓋而為知己中心莫逆或三接而始同臭味寤寐勿諼遇詰曲聱牙而不屑世故者命楮先生略為慰藉值艱深苦刻而不近人情者囑中書軍宛為淹留驟爾而逆日賦萬言之彥殊覺應接不暇悠爾而伴三年十字之賓不妨緩頰寒溫來寒瘦輕俗之子遇之謹厚交粗弱遲速之夫贈以韋弦大抵與古聖先王溫文晉接而遘爽然會心者則挹其精微迎鈎深索隱者則竊其微妙比猶擇木者必取豫章採寶者必托如意若是者幾三十年所而始摘成吾十册之微也書不云乎心之精微口不能言言之微妙書不能文昔人心迹發於語言文字已失本真矣茲又從而摘其緒餘何能微哉是大不然法王內證下地難窺而五十年中因言悟入妙契聖心者已連家記莂矣大法東漸從書妙悟如北齊讀三智一心中得曹溪聞應無所住而生其心嗣後代不乏人傳燈不絶靡不因語言文字冥契精微奧妙世人又何多疑焉第余之所取不敢當精微之目逝將語其下者曰摘其微小微細之一端而已也童蒙時習讀經書章句但記其篇目梗槩便于一時背誦所謂遺其大者遠者焉及辨髦六藉而甘心內典以向之句讀小心而臨於佛法大海汪洋浩浣廣大無涯如太末蟲之緣火𦦨渺難湊泊秋水神之覩海若罔測端倪而無可如何也第於浩博處記其細節廣大處掇其微小意在即微小以稽廣大就細節以檢浩繁不外寸紙而能尋無邊法海究萬象森羅是又摘微小補之一端也間多暗記默識秪堪自怡衰老為良師益友不可持贈他人也蓋移之他目罕不眩然不瞚鄙其無謂而大笑之矣且吾儕處世端在完前生債讀來世書後倘有覽斯文而冥然神會如暗識金環者或是山人之後身不可知也摘記五經章意序繹教之餘翻閲六經唯毛詩幼時習熟餘經不能盡讀且不欲盡讀間有所會輒記其大章關節摘其微辭要意而出之蓋自便於尋討冀有夫教觀云爾或謂六經為聖學之宗學者皆當熟誦全文方間宗旨則不可摘而記出世雖以教助觀要須一空文字方露真心則不必摘而記然則此記何以哉余曰誠然哉然更有所以也竊觀六經之御世一一皆具正心養性齊家治國之道皆能究竟學者身心直躋聖賢之域非此經性理未全更俟他經方得了義也以故學人於一經得意餘第旁通似亦可已且秦火後魯壁古文出六經之興莫盛於西漢然當時六經博士各以一竇自多學士不能獨擅一經國朝取士亦未嘗求備六藝蓋以一經之旨易工而衆妙之門難兼也我何人斯又能間熟六藝以求全儒林之宗旨哉第古人讀書有會必書示有所得而志不忘也此豫五經章意之所以摘而記且將有以助明吾之教觀焉何者如云無不敬儼若思安定辭無體之禮無聲之樂撥亂反正端本澄源誅霸意正人心建中建極咸有一德思無邪無然畔援無然歆羡誕先登于岸何思也何慮也寂然不動感而遂通天下之故凡是族也引而伸之何非誠三業排邪立正杜妄緣以標宗歸極從深禪以豁露唯心之妙慧乎蓋世教雖淺會以圓心即淺而深法華云治世語言皆順正法淨名云文門即解脫故知六藝亦有以助明夫教觀也疇謂世教之必礙至道乎哉必謂二教相悖者梁肅陳瓘馬墟楊傑輩皆歸向佛乘遊心禪觀矣何不礙其為匡君輔世之忠臣偉儒耶必謂二教相悖者遠公以詩義授周續之雷次宗矣有朋法師開胸中六經堂以接士大夫矣何不礙其往生及為教觀之宗匠耶張無盡曰唯吾學佛然後知儒四明謂弟子曰教觀之暇當間習六經以接士大夫庶於世無壅礙耳曾謂六經之反有悖哉然則六經之摘記有以夫或曰六藝既不悖於至道矣寧復礙夫習熟哉何乃沾沾以章節是記不己隘乎蓋律文既許比丘日以二時習學世典所以綏外人而內間正法復禁夫著意求工者故余於六藝不能盡讀且不欲盡讀而姑摘記其章意者庶幾間衛正法以有裨夫教觀之微意也甲辰蠟月乙巳立春日序藥師直解敘東漸聖教每多注疏如金剛楞嚴動輒百十而藥師無解何哉古人意謂秦燔經而經存漢窮經而經亡牽於曲士蔓説耳此經起盡只一三法如日月在天有目皆見直捷顯了無事解釋也余既解矣而云直者不曲之謂也曲引勉證句貼字訓而正義反晦不直矣泛扯成文播弄講口而三德全庋不直矣茲惟隨經直示體宗用法為衆生之三因即果人之三德俾造修者可依之開解可憑之起行如日光明照見種種色而已不敢曲注蔓解以粖聖經者亦解即無解仰體古人無事解釋之意也梧桐月記梧桐月記記梧桐月也所以志夫心之攸適而無諼也夫梧桐之生幹修挺而葉婆娑幽致實繁陰穠秀美菶菶蔞蔞不謝陶弘景松柏滿山涼颸映砌送緑分青象元亮北窗悠然羲皇上人矣逮皎月回顛微風仳影參差錯落委曲玲瓏肖百千片碎玉精金流光逗城又如走盤照乘亂擲衣裾而光怪活潑令人把捉不定佳趣聯翩殆莫可以言語殫述也逮夫席草就影不憚屢遷晤對久如而身世欲空習習兩腋宛在清涼涘也既而天風聿駛樹抄驚濤若碎鴻門之玉斗撒石季倫買姬十斛復肖春潮帶雨晚雷轟被襟當之不覺長笑失聲如金色頭陀瞰須彌大地舉發琴音難遏手舞足蹈幾不有八萬木叉之在躬也山林之樂雖南面不與易誠以南面憂勤無多間適耳曩豫未冠時妄希僥幸對一篝而咿吾染翰大類鐵牛耕石田縱桐月滿窗亦苦境耳客歲逆旅武林日深拘忌鷗鹿之性而強以周旋揖讓進抑退揚之節是百憂心而百不中度程者也明月梧桐亦桎梏矣何樂於我哉今年度夏擕李之天壽山寺有雙桐頗修美涼月裁挂輒跣足箕踞其下幽興翩翩而彌覺其光景橫生洵可樂也然幸身有餘間心無事事乃克恣情以領斯清況耳是則樂不存桐與月而存乎心之間適矣且以天下之大兆民之衆庸詎鮮高岡之植庾樓之明如茲地乎顧匪競名途式趨世諦營營焉如豫向所為者比比而如豫今之心迹灑然以消受斯樂者幾何人耶吾雖喜今之異於昔矣又愳夫後之不如今也是固宜志之不可諼也時紀之七月既望摘百家敘無情中忽然而分四時時之中率然而有春春發奇華異卉紛葩豔麗為萬國瑞參天繡地何殊有情中忽然而有四民民之中掘然而有士士吐錦心繡口黼黻文章成一家言耀古輝今也異哉今夫飛潛遊走與吾人同一知覺性靈也與之言蠢然無知發為聲啾啾嘷叫彼自云云於我何與公冶長介葛盧者世不多出也孰能聽之周君之兄不辨菽麥農工賈家擅廢舉顧兔園册子煩燥無味競為不入耳之言詎能膾炙人口哉士君子天資美粹力擅三長動為百世師言為天下法立言之際靈氣來集子史為之驅馳經傳為之囊括直欲衙官屈宋傖父班馬磅礴今古網羅百世成一家言昭視來茲其業偉哉方其境與心會情與理融洋洋乎筆之所運花敷神助興之所之河決潮奔俄而千軍萬馬雷轟電掣悠然風恬雨霽寂無人聲其廣也長江大河東注不盡其細也一丘一壑幽致有餘多如栲栳傾珠少亦精金片玉于以遊揚道德于以旌表忠貞于以陶寫性情于以咏吟風月負扆而立宗廟朝廷成經國之大事蓬纍而甘衡門泌樂為不朽之盛業蓋不煩慘淡經營而自然陸離彪炳如風行水上自成文理落花水面宛爾文章陸機文賦未足以盡文士得意之妙也由是而下睨飛潛遊走農工賈流智愚不翅霄壤什伯殆夙得性靈之獨厚亶聰明而掘然高出者乎是又不可忽而輕庋之矣然士亦疇不能文哉顧欲成一家言以昭視來茲未易易也方之古聖王以天下為家兆民為子詒厥孫謀至百十世始得名曰國家卿大夫功業足以耀榮盛德足以後子孫蟬聯亦十餘傳乃得列于世家然成周終不可以混夏商而吳太伯非魯周公也是為百家焉士為文章其類是夫以忠孝節義為大本以經傳子史為輔翊合衆美而成一文猶纖萬縷而就一錦有文有賦有序有詩雖與後先千萬人同倫同文而其語氣性靈之所在同而不雜和而不紊也非語語月露人人長慶也猶之合千花萬卉繡地參天以為春然桃終不可以混李李終不可以濫梅若是者方成一家言也今之所集舉能出類拔萃掘然高出而各自成家者也摘百家云摘佛經第一敘如是我聞三界大師於泥曰場中金棺掩曜雙樹潛輝同聞尊者飲光慶喜合志同方結集遺言四依乘願翻譯東漸嗟豫小子幸遇佛乘卷舒鑽仰彌覺堅深爰於大部摘記章節復於小品略識緣由存以救忘難公聞見有婆羅門居士問曰中華聖典班班可考窮理盡性靡不具焉六合之外存而弗論子生中國胡嗜西書豫言不也爾言窮理盡性非皇極經世之太極無極與非夫子之言性與天道與非子欲無言與非無思無為遂通天下與則在當時賢者猶不能會悟聖人引而不發之旨抑況末學膚受者乎子劉子曰讀書三十年百慮而無一獲惟出世法為可盡心張無盡曰惟吾學佛然後知儒得毋儒典深微處非出世法不能融會悟入者與爾何知見之多僻也夫佛教大之則彌綸萬有範圍法界細之則精詳善惡因果分明而其要則在萬緣淨盡心識俱空然後吾人之全體大用當下現前現前時非有非空不俗不真從容中道不涉言思無思也無不思也無為也無不為也雖空空絶迹而義天之星象燦然湛湛亡言而教海之波瀾浩瀚斯之謂窮理盡性斯之謂太極無極斯之謂夫子無言而言性天道斯之謂無思無為而感而遂通是乃佛法廣大精微復能發明先聖躍如之旨者也爾何守夏蟲醯雞之一竇而欲外佛教江海之大天地之高哉婆羅門居士見豫所摘之經聞豫所説之敘皆大歡喜作禮而退普門膚説序此經大師著有玄文法智復詳二記開深進始事理圓暢誠為極廣大精微之典後生何敢贅辭惟是式師分解別偈科巽自然義如冗瑣童蒙求我難遵指授纍因講次潤以淺言在祖師固視之如皮毛碔砆而辨髦之矣學人録存目為膚説蓋以皮膚雖淺亦人身之所不棄者也則是説也庶幾輕塵細霧聊佐高深敢言別見一班居為新説哉知我罪我所不辭也集注節義序玉岡師之注四教儀文也雖廣集成言而聯絡照映如一氣呵成句解字訓矩度自然絶不露援引痕迹畢肖蔡夷峰之鐵板注尚書真勝國出塵大手筆也後人科段瑣碎辨釋云云祖意反晦重昏翳于太虗三光為之戢曜其斯之謂歟不用可也第玉師隨文注釋之外另出手眼所謂與諸家有同異處義似未顯余從而科解之名之曰節何居乎蓋惟解盤根錯節不事細碎科條也且豫從師二十稔稟受八度為衆講説今始七番或時啓幃咨聞或於教部領會書公同志尚亦爝火增輝二曜而已耳後賢苟為未允亦不用可也盂蘭盆經折中疏序泥文字者拘步趨而或失深義縱靈辨者墮虗懸而患不隨經若夫深玄彪炳而復興修多羅合訓詁精詳而適與指外月冥合二妙以雄長成一家而獨步昔之哲人其猶病諸豫閲盂蘭盆新舊二疏而歎夫先賢之未得兼長也舊疏依經判釋多約阿含事相矩度井井而未揭言外義趣新疏妙辨縱橫文義富麗理觀圓極而似不合現文且以單法為名則棄去佛説二字孝慈為宗則多贅流通一慈三寶為體則勉飾一體之談而都忘圓三解脫三復斯文不忍佛經之尚壅也輒不自揣櫽栝疏通扶舊疏以點明義旨正新疏而挽歸契經俾文不失義辨不違經庶幾折中仰弘聖化詎能合二妙以成一家實冀兼事理而從容中道也夫學邯鄲武而未得國能匍匐道上寧免傍觀之笑不如拘步趨乎無所惜之矣玉菴興建緣起玉菴在武原駐車弄後附郭一里許明季甲申歲為邑矜朱我佩創搆以供碧印禪師者五年繼請遺聞法師住持二年天溪老人住持三年運遐法師住持十三年己酉仲春耀承父兄遺緒應檀護鈞命挂瓢其中器界無常年深易朽棟橈屋壞亦理之宜耀時默禱慈雲仰邀神力願建大殿以供三寶客堂以接雲來遂荷本邑檀信省城親友戮力輸將鳩工有日權輿乎庚戌相月落成於本年季冬計建大殿山門雲水堂二十餘間耀因夙修薄祜適罹歲凶僶勉圖成檀波難聚厥功告圓之日稱貸者十三逋負者十三至癸丑冬歷四年所逋貸始完而佛相莊嚴亦燦然於茲歲矣不圖甲寅三月舊有大悲堂久雨坍頽幾至傷人毀像乙卯春圓木重建前後計建殿宇廂房四十餘間并塑像置地總費約二千餘金半荷檀信樂輸半竭不肖鉢資是既衆志成城豈敢貪天功力惟是緣時所洽偶萃眇躬故凡鳩工庀材之際一磚一瓦必躬必親良以興建大途自屬檀波勝善拮據小勤希分勞力微功也且僧傳十科興福退居其後大興土木昔人譏屬有為矧茲小小經營何須書齒但架築之需既承衆力奐輪而後不可遺忘故紀姓氏略昭盛德再俟後賢大幢剎合鐫垂永也題玉菴交單開山舊有交單茲復更立此册者略有三意檀越創建以來業經五六交代紙數不多事難具載一也余自住院十稔屢事土木三殿廊廡主佛韋天俱屬更新依正既非疇昔交册不可因仍二也我檀而後既六易住持自成開山一番終始矣余徼天幸稍擴舊觀則忝居重興之小始如國運再造中興圖籍必非舊日提封三也今以新編十類并舊有交單同付後人者正欲彰創業守成之功德即後賢大幢剎百葉相承亦必以開山更始之册轉相授受庶勿忘銖積寸纍一旅一成之俶始云同戒録序丙辰春期依因此戒得生諸禪定及滅苦智慧是三學以戒為首也比丘戒成懷羅漢胎菩薩戒就入諸佛位是三乘以戒為體也大哉戒乎其為出生死踐佛果之正本歟苐傳授戒法固憑乎十師之清淨慈悲而感發光又存乎諸子之精誠懇惻幸哉一會感應道交無作戒體一衆同霑今而後各護浮囊長養聖孕日就月將遠躋聖位庶不忝茲會授受之勤是所望於諸子也爾其勗諸讀隱秀軒集偶閲鍾伯敬先生隱秀軒集分類約數十種皆備其體而不饒其篇多者數十首少者至一二章而止每閲一類畢未嘗不灑然喜其文之精美而悵其篇之輒盡如小兒食少石蜜適口而更冀其多有也吾意先生為國朝巨儒握文教銓衡所作必不止於此或為選集者刪之太苛與而非耶蓋先生評左傳摘遷史精簡而緽密殊非後人所能置喙豈其自作者後人能去取其間乎然斯集之限於篇章抑又何哉至閲先生興談子論作文曰莫若少作作其所必可傳者選而後作勿作而待選然後釋然大悟先生之作文蓋選而後作作其所必可傳者也尚非作而自選者矧待後之選者刪耶然則斯集之果非後人為之去取也明矣而篇章之不漫存也不亦宜乎嘗見近人覆文瓿集闐咽國門才一展卷便嫌棄其煩冗如嚼木然彌覺其淡而無味也何如此集不煩其篇而特備其體令讀者泠然躍然精神潛移而心目灑然如食蜜雖少而甜性無窮耶一夜珠足以起困貧而致富貴積千碔玞雖多亦奚以為閲鍾子評選史傳詩歸隱秀軒集知而不言是謂之天風物明道文教於是乎作焉然文不難於自作而難於評選古人之作蓋立題命意理閎大而文陸離則已膾炙人口適悅人懷此猶畫龍肖真長袖善舞俾觀者心目驚悅斯不可謂不難矣此苐畫工美人之常耳若夫千百年古人之骨髓命脈蘊於側理吾能潛神冥會入而得之復能搜精括要出以示人使陳死之精神躍然與觀者交接俾之懼然顧化比猶點睛於畫龍而使之破壁驚飛伽陀一丸能生死肉骨而土木形骸皆飛升仙去此屠龍技成而不用其巧復能馴之使興雲致雨以膏澤六合者也是為難耳由此觀之評選古文蓋端也源也自作詩文緒也流也伯敬先生評摘史傳精簡雋永評選詩歸清空靜遠凡古人一篇一意一字一句有深心所託蘊而未能發者必皆搜揭歎賞點示後人真能起千載作者之精神躍然馳驟於豪素間使觀者心目與之泠然接混然一而脫然化者也此點睛手也起死藥也屠龍技成而善用其巧者也殆觀隱秀軒集文則精美簡秀備其體而限其篇詩則清深古博而篇帙差饒于文似乎流清者遡於源潔源大者始得流長也雖然源固有流流必同源首尾似異而河潤萬里道同也作必能評評必善作自他雖存而啓迪後學功一也先生文簡秀而評摘史傳則精簡雋永詩清深而評選詩歸則清空靜遠此又混源流而一之之深切明著者也曾何難易異同之分於其間哉抑其間果有難易流源之辨與吾將咨先生於白雲之鄉必曰吾道之天難易異同亦緒餘也翁永年書法敘世之稱書法三昧者皆於窮愁患難憂喜離合中得之昌黎謂愁思之聲要妙而窮苦之言易好虞卿非窮愁烏能著書例之書法固一道也翁永年先生辛卯壬辰間罹難來杭吾社諸先輩愛其詩文書法競為重恤社中文會湖上杯吟無翁先生則似興皆落莫豫年十九棄去操觚而息心禪觀則與之隔斷紅塵矣獨楷書一箑未忍付諸祖龍耳今甲寅冬來遇玉菴詰姓氏乃知永年先生也出箑相證忽逾二紀真成隔世再晤話言疇昔恍如昨日也及贈余敘舊四律書法八分遒徑陸離大非昔日阿蒙果何術以致之哉先生曰吾屢遘窮愁憂喜二途乍離乍合豫笑曰此正先生得書法三昧之妙境歟追憶西泠真社之盛吾儕後生而與同盟者三人王季侯金晉陽及不肖也當其諸先輩執牛耳以登壇未免操旗鼓而靜聽約束若乃分題屬文卷必先完意不後人直與之並驅中原不知鹿死誰手既而王子鄉捷金子遊泮皆為富貴風流之人豫則安心雌伏須臾王子夭扎金子病廢豫興先生雖困窮而巋然如魯靈光也且先生進於書法不肖脫乎息觀欲謂憂喜離合之非妙境得乎夫崔張比玉逸少似金中人十家不敵片紙則先生已得却窮之技矣抑何愁乎不但是也嘗聞先朝談相徒以工書受知君相世廟時嬰一品寵賚今先生受聘螺翁西席操如椽而交天下士豈如昔日友吾社數十措大而已哉乃為相顧一笑且曰令師徐子近狀何若豫曰今六月修文地下矣復相與泫然久之大藏進廣疏迦文四十九年説法乃曰未曾道著一字少室不立文字而曰吾有楞伽四卷印心抑何相悖也蓋無文字者為過關人解粘脫縛立言教者為未悟人提擕警覺耳劉虬云寄言談于象外而其理絶精粗洎乎兩極之時言即無言無言即言也然則吾儕兩間嗤嗤孰非黃粱未熟之人如來喃喃説法總為開示悟入寶鐸如毗目仙人擕手覩史內紹彈指皆令童子得見無邊佛境重重樓閣者也是則大藏千萬卷之利導生靈豈誠小補者哉吾浙張螺浮先生再來人也給諫諤諤既立功于朝廷周恤殷殷更施德於梓里比欲立言千古完三不朽乃倣太史公歷龍門之險者而遊羅浮恍然悟前身為羅浮山內僧與蘇端明之五祖戒王新建之定中僧者孱齊復慨嶺南遼遠佛法瞢聞願捨大藏於羅浮永開人天之眼目此又白香山藏經匡廬之同心也夫佛教高深向為出生死之法寶故施之者為功過量受之者感德不資其於諸處皆然矣抑況嶺表少見少聞者耶今而後吾慶全廣生民因言以進無言之旨破夢而覩佛境重重實始張螺浮先生為法界手眼也嶺南大力生無公遣弟子頓覺請經入山螺浮僧那有在久要不忘裝潢全藏出于一門惟是經非一卷路歷數千舟車挽運資斧為煩更乞有力大人出手助和庶可負之而趨也或曰螺浮不愁強弩之末頓覺何復捨此取彼豫曰不然頓覺虞一之為甚螺浮耻獨為君子出世勝善樂與人同幸毋多讓焉閲元白全集庖丁善解目無全牛亦由深識全牛之始終而後可以無間入有餘也若乃群盲摸象觸其尾則曰如帚觸其蹄則曰如臼尚不能諳其始終巨細又烏能識其大全而披剖之耶唯觀古今人之與心亦然憶孩提時從鄉孰師課古文詞則於連昌宮中識微之之纖麗於長恨歌琵琶行中識樂天之諷感及觀新舊唐書唐文類聚甲寅歲讀文苑千卷則見二公之詩文賦表渢渢乎多也然猶之摸象者所見帚焉臼焉而已若乃二公之心迹大全尚在夢夢比閲元白長慶全集則二人者均有短長微之以少年中策穆宗時名滿京洛宮人皆以才子目之身為將相可謂儒學之效矣惟是薦由幸人躁於進取不讓仇士良而致譴欲立奇節以壓衆心而招刺裴之誣人固以輕而視之矣殊不知免貢蚶彈權貴致君澤民之忠溢于言表卓卓乎得大臣任重之體者也樂天仕宦四十餘年隨時黜陟似忘欣戚彼自云云於我何有形於詩賦往往而在所作詩文信口而吟隨筆而書不為艱深刻苦之語唯闢中和平坦門戶人則以俗而名之亦非也蓋其身為大臣世際承平正不欲刻意蜩蟲以失辭達之體故意深而言顯使婦人女子亦能知解須知其深易其淺難其雅易其俗難如秋月晚生丹桂實常娥滿月即成珠等以典雅之文作明顯之句夫郊寒高則寒孤則寒今白俗明則俗和則俗正其雅可及也其俗不可及也至如制誥判詞何常不精微深奧哉此吾識二公本來面目處也而復有短長之説者非昔人元輕白俗之謂也蓋樂天持齋默坐言多達生至於七十之外賣馬遣妓時猶有不能忘情之吟是留連聲妓妮妮欲海者微之逡巡外任求復輔政賫志長徂是戚戚富貴至死而不能釋然者夫熱中太煞達而未達殆二公之短長也此吾知其全而妄肆以無間入有餘之論庶幾庖丁之解乎若謂此論壓倒元白則吾豈敢血書法華經跋為儒佛者率以委蛇八正從容中道無過不及之患是謂得之若孝而必至於割股忠而必至於殺身不已太過而失其中道乎然子不如是則似為孝之力不竭臣不如是則似為忠之心不盡蓋充忠孝之類之極也夫剖心割股斷脰決腹傷形毀性一瞑而萬世不見然後忠孝之心盡忠孝之名立忠孝之行成也與其不及也寧過聖人有所取之矣即為釋子者亦然惟慈父之言行是式受持讀誦書寫解説已為五種法師可自利利他矣而必至以骨為筆刺血為墨書寫經典似過矣殆亦忠臣孝子之用心歟吾於妙因粹生師而見一班焉師剃落應院志在出塵性重譏嫌如擎油鉢忽發僧那刺血以書法華全部夫好事多難理之固然或魔緣競起或內障陡興師刺血書經之志確乎不拔正歷盤根錯節而益見其利也至於舌血盡而刺指指血盡而刺臂臂血盡而命絶絶而蘇則更書嘻吾至此而不能測其志不反顧義不旋踵之勇猛精進矣然調絃者不必太急斫輪者事貴不疾名教中自有樂地八正內道可委蛇以若所為不已太過乎師以為不如是則修行之心不盡修行之事不成修行之道不行也過則過矣其不愈於僧之窳墮飲食八瞢瞢種耶與其不及也寧過昔人深取之蓋以過則可幾於中道而不及則淪入下流矣自握管至今天子在宥十有五年而刺書成裝潢畢將畀之天龍呵護永為叔世奇寶豫竊問曰凡字之一點即用師一點血一點心凡積幾許點畫心血而成一字又積幾許心血而成一偈一卷又積幾許心血而成七卷全經師能思量較計以復我乎師既不可思議己之心血我又烏能心思口議以頌師功德哉然一言可以槩諸迦文以骨為筆刺血為墨如是書經此修行之過也今成正覺是則師之功德殆優入聖域者矣睿公裒文引言世網如八陳圖逗入輒不能出出蓋憑夫學道昔人云人不得道生老病死四字關誰能透過然則學道乃出生死之大本歟由是而下睨語言文字抑末矣大梁睿公年垂知命鋭志修道今且二十年所矣雖衆善俱崇而指歸安養即精力稍憊而禮誦不輟或曰若形神勿王盍緩淨課與則曰主人公一旦欲捐血肉團亦可緩耶雪溪公題憶佛軒云隨波逐浪去翩翩彈指聲中七十年豈不向來知憶佛欲從老去更加鞭豫又可緩其鞭乎第酷嗜當代名公詩文道語龍蛇滿壁儼然詩畫米家船矣惟是少不深書而喜人文墨人或疑之吾聞蘇長公性不解飲而喜觀人飲見其引滿浮白則浩浩焉落落焉如飲情之在己也陶元亮云但識琴中趣何勞絃上聲睿公之不善文而喜人文墨亦是族也或謂睿公操一藝而活於逆旅雖曰好道第一鄉之善士而已何能致四方士君子文藻之多哉是大不然夫漏室來鴻儒之談笑敞廬何妨聚諸賢之珠玉哉且宇宙有何美業唯吾心之神智睿於無窮而已其既修道惟勤固已得出世之大宗大本矣抑況語言文字之緒餘哉吾知諸君子之寵教睿公正未艾也普薦罹難陳亡橫死軍民榜天造草昧利建侯而治藩守不庭唯肅殺為心玩兵搆禍歲無虗日甲寅以來傷殘尤甚弟子沈光華輩目擊死亡同申薦拔設伊蒲之供齋七日以為期禮調御之名足三千之滿數事方伊始給語導之爾等總號三才類分九品魂升魄降出有入無前陰已滅後陰未來渺渺焉一靈何託視則不見聽則不聞冥冥際厥貌難參勿言南面之樂融融順彼適來而適去須知北邙之塵黯黯方且苦畏而苦飢河邊骸骨夢中身曾無彼此枕上鴛鴦華表鶴殆有仙凡宗廟陳尸但見新鬼大而故鬼小空亭兢食惟知我肉盡而他肉來曩時之伎倆如斯今日之消沉敻異非時而死豈屬司命權衡缺具以終正為造物愚弄雖天王明聖等觀赤子於蒼生而下土蒸黎適覯刀兵於定劫甲寅之首藩鎮不庭比歲以來王師薄伐崕崩炮擊消四大於微塵帆破舟沉葬一靈於魚腹勢欲斷流城窟漲征魂之水望成京觀尸僵高戰骨之山爾既爭雄於紅旗影裏國威久恃今固失命於白刃叢中死怨宜無至於四民編戶尺籍羈身秋糧夏稅奉國課以維艱口算丁錢應軍需而不繼致有三旬九食歲富家貧哀王孫而進食罕遇其奇憐范叔之一寒又無其匹瓶之罄壘之恥他鄉嗟空國無人神為馬尻為輪於野見一車載鬼者矣何況更逢殺戮忽罹死亡三重赤暈民少孑遺千里黃埃野無寸草老弱傷於鋒刃少艾牽入軍營骨肉生離四鳥不能各分飛之痛夫妻死訣三聲何足喻腸斷之悲金條脫半殉死稚滿路傷心碧香鉤全埋馬矢千人流涕正劫火憑陵玉石無分於貴賤傾河竭澤鰱鯉孰辨於愚賢試想日出而耕日入而息勉供上賦生也何德今由兵喜而活兵怒而死含淚下泉殺復何辜井山不下於長平仙嶺有逾乎軹道道殤國殣白蟻未束乎苞茅妻虜夫亡青蠅徒能為弔客致令爾輩悠悠長夜秪炊夢裏之黃粱淡淡斜陽好照河邊之白骨委諸丘壑何如零落山丘哭以天陰更乃嘯之白日廣孝阡之怨骨嶙峋説不盡含冤酸楚寒林所之悲風嗚咽訴難窮橫死凄涼本壇遵覺皇遺範惟勤心觀衆信愍爾等久淪共啓法筵意在長引風幡不使碧磷凝野血大明法炬無令青火照陰房於是宣梵唄以當歌鐘采伊蒲而充爼豆亦謀道亦謀食豈類世俗來歆不異空不異色與汝佛法相會𦦨口一斛耳悟則醍醐不悟即為毒藥焦面一士哉識即菩薩不識即是鬼王但了觀力宏深一唾而劫火滅惟心廣大一吹而世界成再不必倚草木於風前直捨鐵圍宮殿又何須歸珮環於月下空將明器莊嚴具壽枉死趨蹡歸安樂之鄉弱鬼強魂瞻仰入無遮之會者復靈芝耆宿公啓伏以先賢月沒劻勷囑在耆年後學童蒙引掖用憑碩德振式微于季葉咸尊砥柱示昏邪之道岸競恃司南高山仰止景行行止恭惟大道望某尊宿座下師模當代領袖後生德風所扇英豪翹首以歸依慈教攸宣緇白希光而景慕乃禪乃教囊括一心立德立言典型萬世兼之謙慈成性飲人以溫樹之和且也接引為心尊賢類平原之俠明揚側陋獎進群心蓋是綰長眉而津範神州要非守金襴以滅定雞足者也比慨法門下替手教遙頒勉某弘經律寺戮力上流曩寂法祖向晦宴息自分獨善螺溪得韶國師推薦明揚不覺騰光天壤某愧非其人實遭其遇苐某樗散庸材雖曾稟教師門難為雕琢駑駘下乘奚堪受知尊宿俾騁康莊拊臆驚思恐辜盛意仰憑老師覆護多方永安中外庶俾不肖支吾小試稍利人天則座下之友聲可副而相與有成即諸公之麗澤少裨而盍簪無忝謹俟春陽用趨鈞命臨書感激無任悚惶之至復寂照諸護法公啓伏以宰官躬弘護之休願承金囑居士總儒釋之宗名燦神州翩翩楊李藉甚祖燈燁燁宗劉彪炳蓮社蓋以動垂名教國步恃以靈長兼之誓職金湯法運由之光大恭惟大護法諸老先生門下湖山育秀生苻申甫之徵乾象擒光群切斗山之仰比則埋輪京輦豺狼避驄馬之風總憲方州士女滿壺漿之謁兼之遊泳佛乘干城法海洵乎夙秉願身總持儒釋者也邇乃方軌給孤俯循梵世以寂照巋存古剎命不肖小試鉛刀琅函載錫玉帛遙頒啓緘而珠璣滿握奚堪華袞之褒拜錫也筐篚盈門如飲江河之潤顧某村墟小草苐屬長行粥飯斥澤微鱗難使觀光滄海是以欲辭恐深方命之愆將受更增覆餗之懼憂惶交并退遂觸籓所恃大君子左提右挈曲為二天之庇乃俾不肖某日就月將得展一割之能庶古寺于以少裨即鈞命因之上副謹俟春王敬聆玄論臨書惴栗無任主臣之復復陳曹諸護法公啓伏以薩埵開普門誓願隨應度而現身將相稟靈山囑纍惟弘護以為心故金吾𮙺道平之職龍光覺道銀鎗去史公之手豁悟心宗是舉緬惟夙誓間法運於草昧之秋一極悲思翊聖化於建侯之日奚翅利見當時抑亦干城末造恭惟大護法諸老先生麾下朝廷柱石法苑金湯從龍開國草露布以行師綰印通侯定廟謨於指掌比乃躬長城而坐鎮東南琴書樂志秉弘願以崇尚佛乘禪慧陶心茲於海潮寺襄成論席爰命不肖某戾止弘經片箋天下玉質金相尺素空揚葩紛彩舞試令入齒飛雪還疑出袖迸霞曩梁慧約朅耒剡上逢周將軍延住草堂某人實天淵乃事符疇昔顧某解疏三觀行昧十乘僅知飲食亡何寧解匡群祖洽猥承鈞命良切驚思仰憑大護法擒光到處自然華雨深而敉寧海衆庶俾不肖某食粟其間亦得法輪轉而上副檀心寅看緑舞宮腰侯新條於細柳營前紅飛錦障秣良駒於大樹叢中臨書戰栗無任恐惶之復
